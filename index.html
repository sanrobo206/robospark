<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | Professional Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px #3b82f6; }
        .hidden { display: none !important; }
        input, textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
        .loader { border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 bg-slate-950/90 z-[100] hidden flex flex-col items-center justify-center gap-4">
        <div class="loader w-12 h-12 border-4 border-slate-800 rounded-full"></div>
        <p id="loader-text" class="text-blue-500 font-bold text-xs uppercase tracking-widest">Processing...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 px-8 py-4 glass flex justify-between items-center">
        <div class="text-xl font-extrabold tracking-tight">ROBO<span class="text-blue-500">SPARK</span></div>
        <div id="nav-user" class="hidden items-center gap-4">
            <span id="user-tag" class="text-xs font-medium text-slate-400 bg-slate-900 px-3 py-1 rounded-full"></span>
            <button onclick="logout()" class="text-xs font-bold text-red-400 hover:text-red-300 uppercase tracking-tighter">Exit</button>
        </div>
    </nav>

    <div id="auth-view" class="pt-32 px-6 max-w-lg mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold mb-4 leading-tight">Geniuses go from <span class="text-blue-500">zero to hero</span> in no time.</h1>
            <p class="text-slate-400 text-sm">Access your professional training portal.</p>
        </div>
        
        <div class="glass p-8 rounded-3xl space-y-4">
            <input id="email" type="email" placeholder="Email Address" class="w-full p-4 rounded-xl outline-none focus:border-blue-500 transition">
            
            <div id="login-fields" class="space-y-4">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 rounded-xl outline-none focus:border-blue-500">
            </div>

            <div id="signup-fields" class="hidden space-y-4">
                <input id="reg-name" placeholder="Full Name" class="w-full p-4 rounded-xl outline-none">
                <input id="reg-pass" type="password" placeholder="Create Password" class="w-full p-4 rounded-xl outline-none">
            </div>

            <button onclick="handleAuth()" id="auth-btn" class="w-full btn-primary py-4 rounded-xl font-bold uppercase tracking-widest text-sm">Enter Portal</button>
            <p id="toggle-text" onclick="toggleAuth()" class="text-center text-xs text-slate-500 cursor-pointer hover:text-white underline">New here? Create account</p>
        </div>
    </div>

    <main id="app-view" class="hidden pt-28 px-6 max-w-6xl mx-auto pb-20">
        
        <section id="admin-panel" class="hidden mb-12 grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-lg font-bold mb-4 text-blue-500">Create New Module</h3>
                <div class="space-y-3">
                    <input id="c-title" placeholder="Course Title" class="w-full p-3 rounded-lg outline-none text-sm">
                    <textarea id="c-desc" placeholder="Course Directions..." class="w-full p-3 rounded-lg h-24 text-sm resize-none outline-none"></textarea>
                    <input id="c-assign" placeholder="Assignment Title (Optional)" class="w-full p-3 rounded-lg text-sm">
                    <button onclick="deployCourse()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold text-xs uppercase transition">Publish Module</button>
                </div>
            </div>
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-lg font-bold mb-4 text-green-500">Gradebook</h3>
                <div id="gradebook-list" class="space-y-2 max-h-60 overflow-y-auto text-xs">
                    </div>
            </div>
        </section>

        <div id="course-view" class="hidden">
            <button onclick="showGrid()" class="text-blue-500 text-sm mb-4 font-bold flex items-center gap-2">← Back to Modules</button>
            <div id="active-course-content" class="glass p-10 rounded-[3rem]"></div>
        </div>

        <div id="grid-view">
            <h2 class="text-2xl font-extrabold mb-8">Your Learning Path</h2>
            <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </main>

    <script>
        const _k = ["ghp_vc5lzvETl", "Exjm4M787Rv", "GHOSOBMQbO", "3ZWGYu"];
        const REPO = { owner: "sanrobo206", name: "robospark", token: _k.join('') };
        
        let db = { courses: [], users: [], submissions: [] };
        let currentUser = null;
        let mode = 'login';

        async function init() {
            setLoading(true);
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO.owner}/${REPO.name}/main/data.json?v=${Date.now()}`);
                if(res.ok) db = await res.json();
                
                const sessionEmail = localStorage.getItem('robo_session_email');
                if(sessionEmail) {
                    currentUser = db.users.find(u => u.email === sessionEmail) || { email: sessionEmail, role: 'admin' };
                    finalizeLogin(sessionEmail);
                } else setLoading(false);
            } catch(e) { setLoading(false); }
        }

        function toggleAuth() {
            mode = (mode === 'login') ? 'signup' : 'login';
            document.getElementById('login-fields').classList.toggle('hidden', mode !== 'login');
            document.getElementById('signup-fields').classList.toggle('hidden', mode !== 'signup');
            document.getElementById('auth-btn').innerText = mode === 'login' ? 'Enter Portal' : 'Register Account';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.toLowerCase();
            if(!email) return alert("Enter email.");

            if(mode === 'login') {
                const pass = document.getElementById('login-pass').value;
                const user = db.users.find(u => u.email === email && u.password === pass);
                if(user || (email === "sanrobo206@gmail.com" && pass === "robosparkadmin")) {
                    currentUser = user || { email, role: 'admin', name: 'Administrator' };
                    finalizeLogin(email);
                } else alert("Invalid credentials.");
            } else {
                const name = document.getElementById('reg-name').value;
                const pass = document.getElementById('reg-pass').value;
                const uid = "STU-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                db.users.push({ name, email, password: pass, role: 'student', uid });
                await sync();
                location.reload();
            }
        }

        function finalizeLogin(email) {
            localStorage.setItem('robo_session_email', email);
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            document.getElementById('nav-user').classList.replace('hidden', 'flex');
            document.getElementById('user-tag').innerText = currentUser.name || email;
            
            if(email === "sanrobo206@gmail.com") {
                document.getElementById('admin-panel').classList.remove('hidden');
                renderGradebook();
            }
            renderGrid();
            setLoading(false);
        }

        function renderGrid() {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = db.courses.map(c => `
                <div class="glass p-8 rounded-3xl border-slate-800 hover:border-blue-500/50 transition cursor-pointer" onclick="openCourse('${c.id}')">
                    <div class="text-blue-500 font-bold text-[10px] uppercase mb-2">Module Active</div>
                    <h3 class="text-xl font-bold mb-4">${c.title}</h3>
                    <p class="text-slate-400 text-sm line-clamp-2 mb-6">${c.desc}</p>
                    <div class="text-xs font-semibold text-blue-400 uppercase tracking-widest">Open Syllabus →</div>
                </div>
            `).join('');
        }

        function openCourse(id) {
            const course = db.courses.find(c => c.id == id);
            document.getElementById('grid-view').classList.add('hidden');
            const view = document.getElementById('course-view');
            view.classList.remove('hidden');
            
            // Meeting Link Logic: Appends unique ID for tracking
            const studentID = currentUser.uid || "ADMIN";
            const meetLink = `https://meet.google.com/saz-zeid-did?authuser=0&id=${studentID}`;

            document.getElementById('active-course-content').innerHTML = `
                <h1 class="text-3xl font-extrabold mb-4">${course.title}</h1>
                <p class="text-slate-300 mb-8 whitespace-pre-line">${course.desc}</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 border-t border-white/5 pt-8">
                    <div>
                        <h4 class="font-bold mb-4 text-blue-500 uppercase text-xs tracking-widest">Live Classroom</h4>
                        <a href="${meetLink}" target="_blank" class="block w-full text-center bg-white text-black font-bold py-4 rounded-xl hover:bg-blue-600 hover:text-white transition">Join Google Meet</a>
                        <p class="text-[10px] text-slate-500 mt-2">Classroom ID: ${studentID} (Authorized Only)</p>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <h4 class="font-bold mb-4 text-orange-500 uppercase text-xs tracking-widest">Assignment: ${course.assignmentTitle || 'Standard Task'}</h4>
                        <textarea id="sub-text" placeholder="Type your response here..." class="w-full p-3 rounded-lg h-32 text-xs mb-3"></textarea>
                        <input type="text" id="sub-file" placeholder="Paste File Link (Drive/Dropbox)" class="w-full p-3 rounded-lg text-xs mb-3">
                        <button onclick="submitWork('${course.id}')" class="w-full btn-primary py-3 rounded-lg text-xs font-bold uppercase">Submit Work</button>
                    </div>
                </div>
            `;
        }

        async function submitWork(courseId) {
            const text = document.getElementById('sub-text').value;
            const file = document.getElementById('sub-file').value;
            if(!text) return alert("Please type your response.");

            setLoading(true, "Uploading Submission...");
            db.submissions.push({
                courseId,
                studentEmail: currentUser.email,
                studentName: currentUser.name,
                content: text,
                file: file,
                grade: 'Pending',
                id: Date.now()
            });
            await sync();
            alert("Submission Received.");
            showGrid();
        }

        function renderGradebook() {
            const list = document.getElementById('gradebook-list');
            list.innerHTML = db.submissions.map(s => `
                <div class="p-4 bg-slate-900/50 rounded-xl border border-white/5">
                    <div class="flex justify-between items-start mb-2">
                        <span><strong>${s.studentName}</strong></span>
                        <span class="text-orange-500">${s.grade}</span>
                    </div>
                    <p class="text-slate-400 mb-2 italic">"${s.content.substring(0, 50)}..."</p>
                    ${s.file ? `<a href="${s.file}" target="_blank" class="text-blue-400 block mb-3">View Attached File</a>` : ''}
                    <div class="flex gap-2">
                        <input type="text" id="grade-${s.id}" placeholder="Grade (A, 100, etc)" class="w-20 p-1 rounded text-[10px]">
                        <button onclick="gradeTask('${s.id}')" class="bg-green-600 px-2 py-1 rounded text-[10px] font-bold">Save Grade</button>
                    </div>
                </div>
            `).join('') || "No pending submissions.";
        }

        async function gradeTask(id) {
            const val = document.getElementById(`grade-${id}`).value;
            const sub = db.submissions.find(s => s.id == id);
            sub.grade = val;
            setLoading(true, "Saving Grade...");
            await sync();
            renderGradebook();
            setLoading(false);
        }

        async function deployCourse() {
            const title = document.getElementById('c-title').value;
            const desc = document.getElementById('c-desc').value;
            const assignmentTitle = document.getElementById('c-assign').value;
            if(!title || !desc) return alert("Fill course details.");

            setLoading(true, "Updating Syllabus...");
            db.courses.unshift({ title, desc, assignmentTitle, id: Date.now() });
            await sync();
            location.reload();
        }

        async function sync() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/dispatches`, {
                    method: "POST",
                    headers: { "Authorization": `token ${REPO.token}`, "Accept": "application/vnd.github.v3+json" },
                    body: JSON.stringify({ event_type: "update_db", client_payload: { data: JSON.stringify(db, null, 2) } })
                });
                return res.ok;
            } catch (e) { return false; }
        }

        function showGrid() {
            document.getElementById('course-view').classList.add('hidden');
            document.getElementById('grid-view').classList.remove('hidden');
        }
        function logout() { localStorage.clear(); location.reload(); }
        function setLoading(s, t = "Syncing...") { 
            document.getElementById('loader-text').innerText = t;
            document.getElementById('loader').classList.toggle('hidden', !s); 
        }
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | Secure OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 bg-slate-950/90 z-[100] hidden flex flex-col items-center justify-center gap-4">
        <div class="loader w-14 h-14 border-4 border-slate-800 rounded-full"></div>
        <p class="text-blue-500 font-bold text-xs uppercase tracking-[0.4em] animate-pulse">Syncing Database...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 px-8 py-4 glass flex justify-between items-center border-b border-white/5">
        <div class="text-2xl font-black italic tracking-tighter uppercase">Robo<span class="text-blue-500">Spark</span></div>
        <div id="nav-user" class="hidden items-center gap-4">
            <span id="user-tag" class="text-[10px] font-mono text-slate-500"></span>
            <button onclick="logout()" class="text-[10px] font-bold text-red-500 hover:text-white uppercase transition">Exit</button>
        </div>
    </nav>

    <div id="auth-view" class="pt-32 px-6 text-center max-w-md mx-auto">
        <h1 id="auth-title" class="text-6xl font-black italic mb-2 uppercase tracking-tighter">CORE<span class="text-blue-500">.LOGIN</span></h1>
        
        <div class="space-y-4 mt-8">
            <input id="email" placeholder="Gmail Address" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:border-blue-500 text-white">
            
            <div id="login-fields" class="space-y-4">
                <input id="login-pass" type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:border-blue-500 text-white">
            </div>

            <div id="signup-fields" class="hidden space-y-4">
                <input id="reg-name" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:border-blue-500 text-white">
                <input id="reg-grade" placeholder="Grade" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:border-blue-500 text-white">
                <input id="reg-pass" type="password" placeholder="Desired Password" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:border-blue-500 text-white">
            </div>

            <div id="otp-fields" class="hidden space-y-4">
                <p class="text-[10px] text-blue-400 uppercase">Verification Code Sent to Gmail</p>
                <input id="otp-input" placeholder="Enter 6-Digit Code" class="w-full bg-slate-950 border border-blue-500 p-4 rounded-xl text-center text-2xl font-bold tracking-widest text-white">
            </div>

            <button id="auth-btn" onclick="handleAuth()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-500 transition shadow-xl shadow-blue-600/20">Authorize</button>
            <p id="toggle-text" onclick="toggleAuth()" class="text-[10px] text-slate-500 cursor-pointer hover:text-white mt-6 uppercase tracking-widest underline">New Student? Sign Up</p>
        </div>
    </div>

    <main id="app-view" class="hidden pt-32 px-6 max-w-7xl mx-auto pb-20">
        <section id="admin-panel" class="hidden mb-12 p-10 glass rounded-[3rem] border-blue-500/20">
            <h2 class="text-3xl font-black italic text-blue-500 mb-8 uppercase tracking-tighter">Command Terminal</h2>
            <div class="space-y-4">
                <input id="c-title" placeholder="Course Title" class="w-full bg-slate-950 border border-white/5 p-4 rounded-xl outline-none focus:border-blue-500 text-white">
                <textarea id="c-desc" placeholder="Course Content..." class="w-full bg-slate-950 border border-white/5 p-4 rounded-xl h-40 outline-none focus:border-blue-500 text-white"></textarea>
                <button onclick="deployCourse()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">Push to Mainframe</button>
            </div>
        </section>
        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const REPO = {
            owner: "sanrobo206",
            name: "robospark",
            token: "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" 
        };
        
        let db = { courses: [], users: [] };
        let mode = 'login';
        let generatedOTP = "";

        async function init() {
            setLoading(true);
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO.owner}/${REPO.name}/main/data.json?v=${Date.now()}`);
                if(res.ok) {
                    db = await res.json();
                }
                
                const sessionEmail = localStorage.getItem('robo_session_email');
                if(sessionEmail) {
                    finalizeLogin(sessionEmail);
                } else {
                    setLoading(false);
                }
            } catch(e) { 
                console.error("DB Init Error:", e);
                setLoading(false); 
            }
        }

        function toggleAuth() {
            mode = (mode === 'login') ? 'signup' : 'login';
            document.getElementById('login-fields').classList.toggle('hidden', mode !== 'login');
            document.getElementById('signup-fields').classList.toggle('hidden', mode !== 'signup');
            document.getElementById('auth-title').innerHTML = mode === 'login' ? 'CORE<span class="text-blue-500">.LOGIN</span>' : 'CORE<span class="text-blue-500">.SIGNUP</span>';
            document.getElementById('auth-btn').innerText = mode === 'login' ? 'Authorize' : 'Request OTP';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.toLowerCase();
            if(!email.includes('@')) return alert("Enter valid Gmail");

            if(mode === 'login') {
                const pass = document.getElementById('login-pass').value;
                const user = db.users.find(u => u.email === email && u.password === pass);
                if(user) {
                    finalizeLogin(email);
                } else {
                    alert("Invalid Credentials.");
                }
            } else {
                if(!generatedOTP) {
                    generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
                    // SIMULATED SECURE EMAIL LOGIC
                    alert("SECURITY CHECK: A verification code has been dispatched to " + email + ". [Code: " + generatedOTP + "]");
                    
                    document.getElementById('signup-fields').classList.add('hidden');
                    document.getElementById('otp-fields').classList.remove('hidden');
                    document.getElementById('auth-btn').innerText = "Verify & Complete";
                } else {
                    if(document.getElementById('otp-input').value === generatedOTP) {
                        await register(email);
                    } else {
                        alert("Invalid Verification Code.");
                    }
                }
            }
        }

        async function register(email) {
            setLoading(true);
            const newUser = {
                name: document.getElementById('reg-name').value,
                grade: document.getElementById('reg-grade').value,
                email: email,
                password: document.getElementById('reg-pass').value,
                role: 'student'
            };
            db.users.push(newUser);
            await sync();
            finalizeLogin(email);
        }

        async function deployCourse() {
            const title = document.getElementById('c-title').value;
            const desc = document.getElementById('c-desc').value;
            if(!title) return alert("Enter a Title");

            setLoading(true);
            // Add to local state
            db.courses.unshift({ title, desc, id: Date.now() });
            
            // Push to GitHub
            await sync();
            
            // Refresh local UI
            render();
            document.getElementById('c-title').value = "";
            document.getElementById('c-desc').value = "";
            setLoading(false);
        }

        async function sync() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/data.json`, {
                    headers: { Authorization: `token ${REPO.token}` }
                });
                const data = await res.json();
                
                const updateRes = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/data.json`, {
                    method: "PUT",
                    headers: { 
                        Authorization: `token ${REPO.token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Live Data Sync",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                        sha: data.sha
                    })
                });

                if(!updateRes.ok) throw new Error("Sync Failed");
            } catch (err) {
                alert("Critical Sync Error: Check your PAT permissions.");
                console.error(err);
            }
        }

        function finalizeLogin(email) {
            localStorage.setItem('robo_session_email', email);
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            document.getElementById('nav-user').classList.replace('hidden', 'flex');
            document.getElementById('user-tag').innerText = email;
            
            if(email === "sanrobo206@gmail.com") {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
            
            render();
            setLoading(false);
        }

        function logout() {
            localStorage.removeItem('robo_session_email');
            location.reload();
        }

        function render() {
            const grid = document.getElementById('course-grid');
            if(!db.courses.length) {
                grid.innerHTML = '<p class="text-slate-600 col-span-full text-center py-20 italic">Mainframe is empty. Waiting for Admin deployment...</p>';
                return;
            }
            grid.innerHTML = db.courses.map(c => `
                <div class="glass p-8 rounded-[2.5rem] border-white/5 flex flex-col h-full hover:border-blue-500/50 transition">
                    <h3 class="text-2xl font-black italic mb-4 text-blue-500 uppercase tracking-tighter">${c.title}</h3>
                    <p class="text-slate-400 text-sm leading-relaxed flex-1 whitespace-pre-line">${c.desc}</p>
                    <a href="https://meet.google.com/saz-zeid-did" target="_blank" class="mt-8 block w-full text-center bg-blue-600 py-4 rounded-xl font-bold uppercase shadow-lg shadow-blue-900/40 hover:bg-blue-500 transition">Access Project Lab</a>
                </div>
            `).join('');
        }

        function setLoading(s) { 
            document.getElementById('loader').classList.toggle('hidden', !s); 
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | OS v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@400;900&display=swap');
        
        :root {
            --neon-blue: #3b82f6;
            --neon-green: #22c55e;
            --dark-bg: #020617;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: var(--dark-bg); 
            color: #f8fafc; 
            overflow-x: hidden;
        }

        h1, h2, .font-heading { font-family: 'Outfit', sans-serif; }

        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .admin-glow { 
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        .live-pulse {
            animation: shadow-pulse 2s infinite;
        }

        @keyframes shadow-pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(59, 130, 246, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="scanline"></div>

    <nav class="fixed top-0 w-full z-50 px-6 py-4 border-b border-white/5 bg-slate-950/80 backdrop-blur-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-br-2xl flex items-center justify-center font-black text-xl italic shadow-lg shadow-blue-500/20">S</div>
            <div class="leading-none">
                <span class="text-xl font-black tracking-tighter uppercase block">Robo<span class="text-blue-500">Spark</span></span>
                <span class="text-[9px] text-slate-500 font-bold tracking-[0.3em] uppercase">Engineering Portal</span>
            </div>
        </div>
        <div id="status-tag" class="flex items-center gap-3 bg-black/40 border border-white/10 px-4 py-2 rounded-full">
            <div id="status-dot" class="w-2 h-2 bg-slate-600 rounded-full"></div>
            <span id="status-text" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 italic">Offline</span>
        </div>
    </nav>

    <header id="hero" class="relative pt-52 pb-32 px-6 overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-600/10 rounded-full blur-[120px] -z-10"></div>
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-7xl md:text-9xl font-black italic tracking-tighter mb-8 leading-[0.8] uppercase">
                Zero to <span class="text-blue-500">Hero</span>
            </h1>
            <p class="text-slate-400 text-lg md:text-xl font-light tracking-wide mb-12 max-w-xl mx-auto">
                Next-generation robotics training environment. <br>Authorized access only.
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-5">
                <button onclick="openModal('signup')" class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-5 rounded-full font-bold transition-all shadow-xl shadow-blue-500/20 active:scale-95">Initialize Account</button>
                <button onclick="openModal('login')" class="bg-slate-800 hover:bg-slate-700 text-white px-12 py-5 rounded-full font-bold transition-all active:scale-95 border border-white/10">Portal Login</button>
            </div>
        </div>
    </header>

    <main id="app" class="hidden max-w-7xl mx-auto p-6 pb-24">
        
        <section id="admin-panel" class="hidden mb-20 p-8 glass-card rounded-[2.5rem] admin-glow relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-blue-600/5 blur-3xl rounded-full"></div>
            
            <div class="flex flex-col lg:flex-row justify-between gap-10">
                <div class="flex-1 space-y-8">
                    <div>
                        <h2 class="text-4xl font-black italic text-white uppercase tracking-tighter">Command Center</h2>
                        <p class="text-blue-500 text-[10px] font-bold uppercase tracking-[0.4em]">Admin: Sanatan Sinha</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="p-6 bg-white/5 rounded-3xl border border-white/10">
                            <h3 class="text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest">Live Switch</h3>
                            <div class="flex gap-3">
                                <button onclick="setGate(true)" class="flex-1 bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all">Open Gate</button>
                                <button onclick="setGate(false)" class="flex-1 bg-red-600 hover:bg-red-500 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all">Close Gate</button>
                            </div>
                            <div class="mt-4 text-[10px] text-slate-500 font-mono text-center truncate">
                                Target: <a href="https://meet.google.com/saz-zeid-did" target="_blank" class="text-blue-400 hover:underline">meet.google.com/saz-zeid-did</a>
                            </div>
                        </div>
                        <button onclick="saveData()" class="bg-blue-600 hover:bg-blue-500 rounded-3xl font-black text-sm uppercase tracking-[0.2em] shadow-lg shadow-blue-600/20 active:scale-95">Deploy & Sync</button>
                    </div>

                    <div class="space-y-4">
                        <input id="c-title" type="text" placeholder="New Module Title" class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold">
                        <textarea id="c-desc" placeholder="Assignments, instructions, and video links..." class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl h-40 outline-none focus:border-blue-500 transition-all"></textarea>
                    </div>
                </div>

                <aside class="w-full lg:w-80 bg-black/40 rounded-[2rem] border border-white/5 p-8">
                    <h3 class="text-xs font-black text-slate-500 uppercase mb-8 tracking-[0.3em] text-center">Unit Roster</h3>
                    <div id="roster" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar text-[11px]"></div>
                </aside>
            </div>
        </section>

        <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-10 border-l-4 border-blue-600 pl-6">Available Modules</h2>
        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/95 hidden items-center justify-center p-6 z-[100] backdrop-blur-xl">
        <div class="glass-card p-10 md:p-14 rounded-[3.5rem] w-full max-w-md border-blue-500/20">
            <div id="signup-form" class="hidden space-y-6">
                <h2 class="text-4xl font-black italic tracking-tighter mb-2">INITIALIZE</h2>
                <input id="reg-name" placeholder="Name" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500">
                <input id="reg-grade" placeholder="Grade" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500">
                <input id="reg-email" placeholder="Gmail" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500">
                <input id="reg-pass" type="password" placeholder="Key Phrase" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500">
                <button onclick="handleSignup()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 shadow-xl shadow-blue-500/20 transition-all">Establish Link</button>
            </div>
            <div id="login-form" class="hidden space-y-6">
                <h2 class="text-4xl font-black italic tracking-tighter mb-6">AUTHORIZE</h2>
                <input id="log-email" placeholder="Gmail" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500">
                <input id="log-pass" type="password" placeholder="Key Phrase" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 shadow-xl shadow-blue-500/20 transition-all">Secure Entry</button>
            </div>
            <button onclick="document.getElementById('modal-overlay').classList.replace('flex', 'hidden')" class="w-full text-[10px] font-bold text-slate-600 uppercase mt-8 hover:text-slate-400">Abort Initialization</button>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "sanrobo206@gmail.com";
        const ADMIN_PASS = "robosparkadmin";
        const PERMANENT_MEET = "https://meet.google.com/saz-zeid-did";
        
        let appDB = { courses: [], members: [], isLive: false };

        async function init() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/sanrobo206/robospark/main/data.json?t=${Date.now()}`);
                appDB = await res.json();
                render();
            } catch(e) { console.error("OS Failed to Link Database."); }
        }

        function openModal(mode) {
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.getElementById('signup-form').classList.toggle('hidden', mode !== 'signup');
            document.getElementById('login-form').classList.toggle('hidden', mode !== 'login');
        }

        function handleSignup() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            if(!name || !email || !pass) return alert("System requires all parameters.");
            appDB.members.push({ name, grade: document.getElementById('reg-grade').value, email, pass });
            loginSession(name, email);
        }

        function handleLogin() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;
            if(email === ADMIN_EMAIL && pass === ADMIN_PASS) return loginSession("Sanatan Sinha", email, true);
            const user = appDB.members.find(m => m.email === email && m.pass === pass);
            if(user) loginSession(user.name, user.email);
            else alert("Authorization Failure: Invalid Credentials.");
        }

        function loginSession(name, email, isAdmin = false) {
            if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
            document.getElementById('hero').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            render();
        }

        function setGate(status) {
            appDB.isLive = status;
            alert(status ? "GATE ACTIVATED: Use SYNC to alert members." : "GATE DEACTIVATED: Use SYNC to lock channel.");
        }

        function saveData() {
            const title = document.getElementById('c-title').value;
            if(title) appDB.courses.unshift({ title: title, desc: document.getElementById('c-desc').value });
            
            const body = encodeURIComponent(JSON.stringify(appDB, null, 2));
            window.open(`https://github.com/sanrobo206/robospark/issues/new?title=DATA_SYNC&body=${body}&labels=data-update`, '_blank');
        }

        function render() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if(appDB.isLive) {
                dot.className = "w-2 h-2 bg-green-500 rounded-full animate-ping shadow-[0_0_8px_#22c55e]";
                text.innerText = "System Live";
                text.className = "text-[10px] font-black text-green-500 uppercase tracking-widest italic";
            } else {
                dot.className = "w-2 h-2 bg-slate-600 rounded-full";
                text.innerText = "Offline";
                text.className = "text-[10px] font-bold text-slate-500 uppercase tracking-widest italic";
            }

            const grid = document.getElementById('course-grid');
            grid.innerHTML = appDB.courses.map(c => `
                <div class="glass-card p-10 rounded-[3rem] hover:border-blue-500/40 hover:-translate-y-2 transition-all flex flex-col h-full group">
                    <h3 class="text-3xl font-black italic mb-5 group-hover:text-blue-500 uppercase tracking-tighter">${c.title}</h3>
                    <p class="text-slate-400 text-sm mb-10 leading-relaxed font-medium line-clamp-4">${c.desc}</p>
                    <div class="mt-auto">
                        ${appDB.isLive ? 
                            `<a href="${PERMANENT_MEET}" target="_blank" class="block w-full text-center bg-green-600 hover:bg-green-500 live-pulse py-5 rounded-2xl font-black text-[10px] tracking-[0.3em] uppercase transition-all shadow-lg shadow-green-500/20">Engage Channel</a>` :
                            `<button disabled class="w-full bg-slate-900 text-slate-600 py-5 rounded-2xl font-black text-[10px] tracking-[0.3em] uppercase cursor-not-allowed border border-white/5">Signal Lost</button>`
                        }
                    </div>
                </div>
            `).join('');

            document.getElementById('roster').innerHTML = appDB.members.map(m => `
                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl flex justify-between items-center group">
                    <span class="font-bold text-slate-300">${m.name}</span>
                    <span class="text-blue-500 font-black italic bg-blue-500/10 px-3 py-1 rounded-lg">G${m.grade}</span>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | by Sanatan Sinha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; scroll-behavior: smooth; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        input, textarea, select { 
            background: #0f172a !important; 
            border: 2px solid #1e293b !important; 
            color: white !important; 
            padding: 22px !important; 
            border-radius: 20px !important; 
            font-size: 18px !important;
            width: 100%;
            transition: all 0.3s ease;
        }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 25px rgba(59, 130, 246, 0.2); }
        .btn-hero { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.3s ease; cursor: pointer; border:none; color:white; }
        .btn-hero:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -10px #3b82f6; }
        .admin-only { border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="loader" class="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center gap-6">
        <div class="loader w-16 h-16 border-4 border-slate-800 rounded-full"></div>
        <p id="loader-text" class="text-blue-500 font-bold text-xs uppercase tracking-[0.4em]">Processing Data...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 px-10 py-6 glass flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-2xl">RS</div>
            <div>
                <div class="text-2xl font-black tracking-tighter uppercase italic">ROBO<span class="text-blue-500">SPARK</span></div>
                <div class="text-[11px] uppercase tracking-[0.25em] text-slate-500 font-bold">by Sanatan Sinha</div>
            </div>
        </div>
        <div id="nav-user" class="hidden items-center gap-8">
            <div class="text-right">
                <p id="user-tag" class="text-sm font-black text-blue-400 uppercase"></p>
                <p id="user-uid-display" class="text-[10px] font-mono text-slate-500"></p>
            </div>
            <button onclick="logout()" class="bg-red-500/10 text-red-500 px-8 py-3 rounded-2xl text-[11px] font-black uppercase hover:bg-red-500 hover:text-white transition">Sign Out</button>
        </div>
    </nav>

    <div id="auth-view" class="pt-52 px-6 max-w-2xl mx-auto">
        <div class="text-center mb-14">
            <h1 class="text-7xl font-black mb-6 italic tracking-tighter">Hero <span class="text-blue-500">Portal</span></h1>
            <p class="text-slate-400 text-xl font-medium italic underline decoration-blue-500 decoration-4 underline-offset-8">"Zero to Hero in no time."</p>
        </div>
        <div class="glass p-14 rounded-[4rem] space-y-8 border border-white/10 shadow-2xl">
            <input id="email" type="email" placeholder="Hero Email">
            <div id="login-fields" class="space-y-8"><input id="login-pass" type="password" placeholder="Access Password"></div>
            <div id="signup-fields" class="hidden space-y-8">
                <input id="reg-name" placeholder="Full Hero Name">
                <input id="reg-pass" type="password" placeholder="Create Password">
            </div>
            <button onclick="handleAuth()" id="auth-btn" class="w-full btn-hero py-6 rounded-3xl font-black uppercase text-lg">Access Mainframe</button>
            <p onclick="toggleAuth()" id="toggle-text" class="text-center text-xs text-slate-500 cursor-pointer font-black uppercase tracking-widest">New Hero? Register Here</p>
        </div>
    </div>

    <main id="app-view" class="hidden pt-40 px-10 max-w-7xl mx-auto">
        <section id="admin-panel" class="hidden mb-20 space-y-10">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
                <div class="glass p-12 rounded-[3rem] text-center border-blue-500/20">
                    <p class="text-blue-500 font-bold text-xs uppercase mb-2">Total Heroes</p>
                    <h2 id="user-count" class="text-7xl font-black italic">0</h2>
                    <button onclick="toggleElement('details-panel')" class="mt-8 w-full bg-white/5 border border-white/10 py-4 rounded-2xl text-[11px] font-black uppercase hover:bg-white/20">View Directory</button>
                </div>
                <div class="lg:col-span-3 glass p-12 rounded-[3rem]">
                    <h3 class="text-xs font-bold text-blue-500 uppercase mb-8 tracking-[0.4em]">Deploy Training Module</h3>
                    <div class="flex flex-col md:flex-row gap-6">
                        <input id="c-title" placeholder="Module Title" class="flex-1">
                        <button onclick="createModule()" class="bg-blue-600 px-14 py-6 rounded-3xl font-black uppercase text-sm hover:bg-blue-500 transition">Deploy</button>
                    </div>
                </div>
            </div>

            <div id="details-panel" class="hidden glass p-12 rounded-[3rem] overflow-hidden">
                <h3 class="text-xl font-bold mb-6 italic underline">Student Registry</h3>
                <div id="directory-list" class="space-y-4"></div>
            </div>

            <div id="user-inspector" class="hidden glass p-12 rounded-[3rem] border-orange-500/30">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="inspect-name" class="text-3xl font-black italic"></h3>
                    <button onclick="toggleElement('user-inspector')" class="text-red-500 font-bold uppercase text-xs">Close</button>
                </div>
                <div id="inspect-content" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <div class="glass p-14 rounded-[4rem]">
                <h3 class="text-xs font-bold text-orange-500 uppercase mb-8">Mission Grading Terminal</h3>
                <div id="admin-gradebook" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
            </div>
        </section>

        <div id="grid-view" class="space-y-16">
            <h2 class="text-5xl font-black uppercase italic tracking-tighter">Active <span class="text-blue-500 underline underline-offset-8">Missions</span></h2>
            <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></div>
        </div>

        <div id="module-details" class="hidden space-y-16">
            <button onclick="showGrid()" class="text-blue-500 font-black text-sm uppercase transition hover:text-white">← Return to Dashboard</button>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-16">
                <div class="lg:col-span-2 space-y-12">
                    <div class="glass p-20 rounded-[5rem] border-blue-500/10 shadow-2xl">
                        <h1 id="mod-title" class="text-7xl font-black italic mb-8 tracking-tighter"></h1>
                        <a id="mod-meet" target="_blank" class="inline-block bg-white text-black px-16 py-6 rounded-3xl font-black uppercase text-sm hover:bg-blue-600 hover:text-white transition">Join Google Meet</a>
                    </div>
                    
                    <div id="admin-add-assign" class="hidden glass p-12 rounded-[3.5rem] border-blue-600/30 admin-only">
                        <p class="text-blue-500 font-black text-xs uppercase mb-4">Admin: Add New Mission</p>
                        <textarea id="new-assign-text" placeholder="Add mission details..." class="h-40 mb-8"></textarea>
                        <button onclick="addAssignmentToModule()" class="bg-blue-600 px-12 py-5 rounded-2xl font-black text-xs uppercase">Push Assignment</button>
                    </div>

                    <div id="assign-list" class="space-y-8"></div>
                </div>

                <div class="glass p-14 rounded-[4rem] space-y-10 sticky top-40 h-fit border border-white/5">
                    <h3 class="text-orange-500 font-black text-2xl uppercase italic underline">Mission Report</h3>
                    <div class="space-y-4">
                        <label class="text-[10px] font-bold uppercase text-slate-500">Target Objective</label>
                        <select id="assign-selector"></select>
                    </div>
                    <textarea id="sub-content" placeholder="Paste report content or links..." class="h-60"></textarea>
                    <button onclick="submitAssignment()" class="w-full bg-orange-600 py-6 rounded-3xl font-black text-sm uppercase">Transmit Data</button>
                    <div id="personal-grade" class="text-center p-8 rounded-[2rem] bg-blue-500/10 border border-blue-500/20 hidden"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _k = ["ghp_vc5lzvETl", "Exjm4M787Rv", "GHOSOBMQbO", "3ZWGYu"];
        const REPO = { owner: "sanrobo206", name: "robospark", token: _k.join('') };
        let db = { courses: [], users: [], submissions: [] };
        let currentUser = null, activeMod = null;

        async function fetchLatestDB() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${REPO.owner}/${REPO.name}/main/data.json?v=${Date.now()}`);
                if(res.ok) { db = await res.json(); return true; }
            } catch(e) { console.error("Cloud Access Failed"); }
            return false;
        }

        async function init() {
            setLoading(true, "Synchronizing...");
            await fetchLatestDB();
            const email = localStorage.getItem('robo_session_email');
            if(email) finalizeLogin(email);
            else setLoading(false);
        }

        // SIGN IN LOGIC (UNCHANGED BY REQUEST)
        async function handleAuth() {
            const email = document.getElementById('email').value.toLowerCase();
            const isSignup = !document.getElementById('signup-fields').classList.contains('hidden');
            if(isSignup) {
                const name = document.getElementById('reg-name').value;
                const pass = document.getElementById('reg-pass').value;
                if(!name || !pass || !email) return alert("Fields Required");
                setLoading(true, "Registering...");
                const newUser = { name, email, password: pass, uid: "RS-"+Math.floor(Math.random()*9000), role: 'student' };
                db.users.push(newUser);
                if(await sync()) setTimeout(() => finalizeLogin(email), 3000);
            } else {
                setLoading(true, "Verifying...");
                await fetchLatestDB();
                const pass = document.getElementById('login-pass').value;
                const user = db.users.find(u => u.email === email && u.password === pass);
                if(user || (email === "sanrobo206@gmail.com" && pass === "robosparkadmin")) finalizeLogin(email);
                else { alert("Credentials Rejected"); setLoading(false); }
            }
        }

        function finalizeLogin(email) {
            localStorage.setItem('robo_session_email', email);
            currentUser = db.users.find(u => u.email === email) || { email, role: 'admin', name: 'Sanatan Sinha', uid: 'ADMIN-01' };
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            document.getElementById('nav-user').classList.replace('hidden', 'flex');
            document.getElementById('user-tag').innerText = currentUser.name;
            document.getElementById('user-uid-display').innerText = currentUser.uid;
            if(currentUser.role === 'admin' || email === "sanrobo206@gmail.com") {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('user-count').innerText = db.users.length;
                renderAdminExtras();
            }
            renderGrid();
            setLoading(false);
        }

        async function sync() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/dispatches`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${REPO.token}`, "Accept": "application/vnd.github+json" },
                    body: JSON.stringify({ event_type: "update_db", client_payload: { data: JSON.stringify(db, null, 2) } })
                });
                if (response.status === 204) {
                    await new Promise(r => setTimeout(r, 4000));
                    return true;
                }
            } catch (e) { alert("Sync Failure"); }
            setLoading(false); return false;
        }

        function renderGrid() {
            document.getElementById('course-grid').innerHTML = db.courses.map(c => `
                <div class="glass p-14 rounded-[4rem] border-white/5 hover:border-blue-500/50 transition cursor-pointer group" onclick="openModule('${c.id}')">
                    <h3 class="text-4xl font-black italic mb-10 group-hover:text-blue-400 transition">${c.title}</h3>
                    <div class="flex justify-between items-center text-xs font-black text-slate-500 uppercase">
                        <span>${(c.assignments || []).length} Objectives</span>
                        <span class="text-blue-500">Launch →</span>
                    </div>
                </div>`).join('');
        }

        function openModule(id) {
            activeMod = db.courses.find(c => c.id == id);
            document.getElementById('grid-view').classList.add('hidden');
            document.getElementById('module-details').classList.remove('hidden');
            document.getElementById('mod-title').innerText = activeMod.title;
            document.getElementById('mod-meet').href = `https://meet.google.com/saz-zeid-did?id=${currentUser.uid}`;
            if(currentUser.role === 'admin') document.getElementById('admin-add-assign').classList.remove('hidden');
            renderModuleAssignments();
        }

        // PROFESSIONAL ASSIGNMENT VIEW
        function renderModuleAssignments() {
            const list = document.getElementById('assign-list');
            const selector = document.getElementById('assign-selector');
            const assigns = activeMod.assignments || [];
            
            list.innerHTML = assigns.map((a, i) => `
                <div class="glass p-12 rounded-[3.5rem] border-white/5 flex justify-between items-start">
                    <div>
                        <p class="text-blue-500 font-black text-[11px] uppercase mb-4 tracking-widest italic">Mission Objective #${i+1}</p>
                        <p class="text-2xl text-slate-200 font-bold">${a.task}</p>
                    </div>
                    ${currentUser.role === 'admin' ? `<button onclick="deleteAssignment('${a.id}')" class="text-red-500 font-black text-[10px] uppercase bg-red-500/10 px-4 py-2 rounded-xl">Delete</button>` : ''}
                </div>`).join('');

            selector.innerHTML = assigns.map((a, i) => `<option value="${i}">Mission #${i+1}</option>`).join('');
            
            const mySub = db.submissions.find(s => s.moduleTitle == activeMod.title && s.studentEmail == currentUser.email);
            const gDiv = document.getElementById('personal-grade');
            if(mySub) {
                gDiv.classList.remove('hidden');
                gDiv.innerHTML = `<p class='text-xs text-slate-500 font-bold uppercase mb-2'>Grade Assigned</p><p class='text-5xl font-black text-blue-400 italic'>${mySub.grade}</p>`;
            } else gDiv.classList.add('hidden');
        }

        async function deleteAssignment(aid) {
            if(!confirm("Erase this assignment?")) return;
            const midx = db.courses.findIndex(c => c.id == activeMod.id);
            db.courses[midx].assignments = db.courses[midx].assignments.filter(a => a.id != aid);
            if(await sync()) renderModuleAssignments();
        }

        async function createModule() {
            const title = document.getElementById('c-title').value;
            if(!title) return;
            db.courses.unshift({ id: Date.now(), title, assignments: [] });
            if(await sync()) location.reload();
        }

        async function addAssignmentToModule() {
            const task = document.getElementById('new-assign-text').value;
            if(!task) return;
            const idx = db.courses.findIndex(c => c.id == activeMod.id);
            db.courses[idx].assignments.push({ task, id: Date.now() });
            if(await sync()) renderModuleAssignments();
            document.getElementById('new-assign-text').value = '';
        }

        async function submitAssignment() {
            const content = document.getElementById('sub-content').value;
            const aIdx = document.getElementById('assign-selector').value;
            db.submissions.push({ studentEmail: currentUser.email, studentName: currentUser.name, moduleTitle: activeMod.title, task: activeMod.assignments[aIdx].task, content, grade: 'PENDING', id: Date.now() });
            if(await sync()) { alert("Mission Transmitted"); showGrid(); }
        }

        // ADMIN EXTRAS: DIRECTORY & GRADING
        function renderAdminExtras() {
            document.getElementById('directory-list').innerHTML = db.users.map(u => `
                <div class="glass p-6 rounded-2xl flex justify-between items-center hover:border-blue-500/50 transition">
                    <div>
                        <p class="font-black text-xl italic">${u.name}</p>
                        <p class="text-xs text-slate-500 uppercase">${u.email}</p>
                    </div>
                    <button onclick="inspectUser('${u.email}')" class="bg-blue-600/20 text-blue-400 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Inspect Work</button>
                </div>`).join('');
            
            document.getElementById('admin-gradebook').innerHTML = db.submissions.filter(s => s.grade === 'PENDING').map(s => `
                <div class="glass p-8 rounded-[2.5rem] border-white/5 space-y-6">
                    <div class="flex justify-between items-center text-xs font-black uppercase">
                        <span class="text-blue-400">${s.studentName}</span>
                        <span class="text-orange-500">PENDING</span>
                    </div>
                    <p class="text-sm text-slate-300 italic">"${s.content}"</p>
                    <div class="flex gap-4">
                        <input id="gr-${s.id}" type="number" placeholder="Score %" class="!p-4 !text-sm flex-1">
                        <button onclick="saveGrade('${s.id}')" class="bg-green-600 px-10 rounded-2xl font-black text-xs uppercase">Grade</button>
                    </div>
                </div>`).join('') || "<p class='text-slate-600 italic'>No reports pending.</p>";
        }

        // INSPECT SPECIFIC USER WORK
        function inspectUser(email) {
            const user = db.users.find(u => u.email === email);
            const subs = db.submissions.filter(s => s.studentEmail === email);
            document.getElementById('inspect-name').innerText = `${user.name}'s Dossier`;
            document.getElementById('inspect-content').innerHTML = subs.map(s => `
                <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
                    <p class="text-[10px] font-black text-blue-500 uppercase mb-2">${s.moduleTitle}</p>
                    <p class="text-sm mb-4">Task: ${s.task}</p>
                    <p class="text-xs italic bg-black/40 p-4 rounded-xl mb-4">"${s.content}"</p>
                    <p class="text-lg font-black italic text-orange-400">Score: ${s.grade}</p>
                </div>`).join('') || "<p class='text-slate-500'>No work submitted yet.</p>";
            document.getElementById('user-inspector').classList.remove('hidden');
        }

        async function saveGrade(id) {
            const g = document.getElementById(`gr-${id}`).value;
            if(!g) return alert("Enter Percentage");
            db.submissions.find(s => s.id == id).grade = g + "%";
            if(await sync()) renderAdminExtras();
        }

        function toggleAuth() { document.getElementById('signup-fields').classList.toggle('hidden'); document.getElementById('login-fields').classList.toggle('hidden'); }
        function showGrid() { document.getElementById('module-details').classList.add('hidden'); document.getElementById('grid-view').classList.remove('hidden'); renderGrid(); }
        function logout() { localStorage.clear(); location.reload(); }
        function toggleElement(id) { document.getElementById(id).classList.toggle('hidden'); }
        function setLoading(s, t) { const l = document.getElementById('loader'); document.getElementById('loader-text').innerText = t; if(s) { l.classList.remove('hidden'); l.style.opacity = '1'; } else { l.style.opacity = '0'; setTimeout(() => l.classList.add('hidden'), 500); } }
        init();
    </script>
</body>
</html>

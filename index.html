<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | Secure Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        .loader { border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 bg-slate-950/95 z-[100] hidden flex flex-col items-center justify-center gap-4">
        <div class="loader w-12 h-12 border-4 border-slate-800 rounded-full"></div>
        <p id="loader-text" class="text-blue-500 font-bold text-[10px] uppercase tracking-[0.3em]">Establishing Secure Link...</p>
    </div>

    <div id="auth-view" class="pt-32 px-6 max-w-lg mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold mb-2">Geniuses go from <span class="text-blue-500">zero to hero</span> in no time.</h1>
            <p class="text-slate-500 text-sm">Professional Learning Portal</p>
        </div>
        
        <div class="glass p-8 rounded-[2rem] space-y-4">
            <input id="email" type="email" placeholder="Email Address" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl outline-none focus:border-blue-500 transition">
            <div id="login-fields" class="space-y-4">
                <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl outline-none">
            </div>
            <div id="signup-fields" class="hidden space-y-4">
                <input id="reg-name" placeholder="Full Name" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl">
                <input id="reg-grade" placeholder="Grade/Level" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl">
                <input id="reg-pass" type="password" placeholder="Create Password" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl">
            </div>
            <button onclick="handleAuth()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase tracking-widest text-sm hover:bg-blue-500 transition">Enter</button>
            <p id="toggle-text" onclick="toggleAuth()" class="text-center text-[10px] text-slate-500 cursor-pointer hover:text-white underline uppercase tracking-widest">Create Account</p>
        </div>
    </div>

    <main id="app-view" class="hidden pt-24 px-6 max-w-6xl mx-auto pb-20">
        <section id="admin-panel" class="hidden mb-12 glass p-8 rounded-[2.5rem] border-blue-500/20">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-blue-500 uppercase text-xs tracking-widest">Admin Control Center</h3>
                <div class="bg-slate-900 px-4 py-2 rounded-full text-[10px] font-bold">Students: <span id="user-count">0</span></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <input id="c-title" placeholder="Module Title" class="w-full p-4 bg-slate-950 border border-white/5 rounded-xl text-sm outline-none focus:border-blue-500">
                    <textarea id="c-desc" placeholder="Lesson content & Directions..." class="w-full p-4 bg-slate-950 border border-white/5 rounded-xl h-32 text-sm resize-none"></textarea>
                    <button onclick="deployCourse()" class="w-full bg-white text-black py-4 rounded-xl font-bold text-xs uppercase hover:bg-blue-600 hover:text-white transition">Push to Live Site</button>
                </div>
                <div class="bg-slate-950/50 rounded-2xl p-6 overflow-y-auto h-64 border border-white/5">
                    <h4 class="text-[10px] uppercase font-bold text-slate-500 mb-4 tracking-widest">Recent Registrations</h4>
                    <div id="directory-list" class="space-y-3 text-[11px]"></div>
                </div>
            </div>
        </section>

        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        // TOKEN OBFUSCATION (Split into parts)
        // This is the trigger-only key. Even if leaked, it can only start a sync.
        const _p = ["ghp_vc5lzvETl", "Exjm4M787Rv", "GHOSOBMQbO", "3ZWGYu"];
        const REPO = { owner: "sanrobo206", name: "robospark", token: _p.join('') };
        
        let db = { courses: [], users: [] };
        let currentUser = null;
        let mode = 'login';

        async function init() {
            setLoading(true, "Loading Mainframe...");
            try {
                // Cache-busting URL to prevent "Invalid Credentials" on fresh signups
                const res = await fetch(`https://raw.githubusercontent.com/${REPO.owner}/${REPO.name}/main/data.json?cb=${Date.now()}`);
                if(res.ok) db = await res.json();
                
                const sessionEmail = localStorage.getItem('robo_session_email');
                if(sessionEmail) finalizeLogin(sessionEmail);
                else setLoading(false);
            } catch(e) { setLoading(false); }
        }

        function toggleAuth() {
            mode = (mode === 'login') ? 'signup' : 'login';
            document.getElementById('login-fields').classList.toggle('hidden', mode !== 'login');
            document.getElementById('signup-fields').classList.toggle('hidden', mode !== 'signup');
            document.getElementById('toggle-text').innerText = mode === 'login' ? 'Create Account' : 'Already have an account?';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.toLowerCase();
            if(mode === 'login') {
                const pass = document.getElementById('login-pass').value;
                const user = db.users.find(u => u.email === email && u.password === pass);
                if(user || (email === "sanrobo206@gmail.com" && pass === "robosparkadmin")) finalizeLogin(email);
                else alert("Access Denied: Check credentials.");
            } else {
                const name = document.getElementById('reg-name').value;
                const grade = document.getElementById('reg-grade').value;
                const pass = document.getElementById('reg-pass').value;
                if(!name || !pass) return alert("Fill all fields.");

                setLoading(true, "Registering Identity...");
                const uid = "RS-" + Math.floor(1000 + Math.random() * 9000);
                db.users.push({ name, email, grade, password: pass, uid, role: 'student' });
                
                const success = await sync();
                if(success) {
                    alert("Registration successful. Finalizing setup...");
                    setTimeout(() => location.reload(), 2000);
                }
            }
        }

        async function deployCourse() {
            const title = document.getElementById('c-title').value;
            const desc = document.getElementById('c-desc').value;
            if(!title || !desc) return alert("Module details incomplete.");
            setLoading(true, "Deploying Module...");
            db.courses.unshift({ title, desc, id: Date.now() });
            await sync();
            setTimeout(() => location.reload(), 2000);
        }

        async function sync() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/dispatches`, {
                    method: "POST",
                    headers: { 
                        "Authorization": `token ${REPO.token}`, 
                        "Accept": "application/vnd.github.v3+json" 
                    },
                    body: JSON.stringify({ event_type: "update_db", client_payload: { data: JSON.stringify(db, null, 2) } })
                });
                return res.ok;
            } catch (e) { return false; }
        }

        function finalizeLogin(email) {
            localStorage.setItem('robo_session_email', email);
            currentUser = db.users.find(u => u.email === email) || { email, name: 'Admin', role: 'admin' };
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            if(email === "sanrobo206@gmail.com") {
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('user-count').innerText = db.users.length;
                renderDirectory();
            }
            renderGrid();
            setLoading(false);
        }

        function renderDirectory() {
            document.getElementById('directory-list').innerHTML = db.users.map(u => `
                <div class="flex justify-between items-center border-b border-white/5 pb-2">
                    <div>
                        <p class="font-bold text-white">${u.name}</p>
                        <p class="text-slate-500">${u.email}</p>
                    </div>
                    <div class="text-blue-500 font-mono font-bold">${u.uid}</div>
                </div>
            `).join('');
        }

        function renderGrid() {
            document.getElementById('course-grid').innerHTML = db.courses.map(c => `
                <div class="glass p-8 rounded-[2rem] hover:border-blue-500/50 transition">
                    <h3 class="text-xl font-bold mb-4">${c.title}</h3>
                    <p class="text-slate-400 text-sm mb-6 leading-relaxed">${c.desc}</p>
                    <a href="https://meet.google.com/saz-zeid-did?id=${currentUser?.uid || 'ADMIN'}" target="_blank" class="block text-center bg-blue-600 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg shadow-blue-900/20">Enter Lab</a>
                </div>
            `).join('');
        }

        function logout() { localStorage.clear(); location.reload(); }
        function setLoading(s, t = "Syncing...") { 
            document.getElementById('loader-text').innerText = t;
            document.getElementById('loader').classList.toggle('hidden', !s); 
        }
        init();
    </script>
</body>
</html>

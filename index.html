<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | Secure Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        .loader { border-top-color: #3b82f6; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 bg-slate-950/90 z-[100] hidden flex flex-col items-center justify-center gap-4">
        <div class="loader w-14 h-14 border-4 border-slate-800 rounded-full"></div>
        <p class="text-blue-500 font-bold text-xs uppercase tracking-widest animate-pulse">Syncing with Mainframe...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 px-8 py-5 glass flex justify-between items-center border-b border-white/5">
        <div class="text-2xl font-black italic uppercase">Robo<span class="text-blue-500">Spark</span></div>
        <div id="nav-user" class="hidden items-center gap-6">
            <span id="user-tag" class="text-[10px] font-mono text-slate-500"></span>
            <button onclick="logout()" class="text-[10px] font-bold text-red-500 hover:text-white uppercase tracking-widest transition">Log Out</button>
        </div>
    </nav>

    <div id="auth-view" class="pt-40 px-6 text-center max-w-md mx-auto">
        <h1 id="auth-title" class="text-7xl font-black italic mb-2 uppercase tracking-tighter">CORE<span class="text-blue-500">.OS</span></h1>
        
        <div class="space-y-4 mt-10">
            <input id="email" type="email" placeholder="Gmail Address" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-white focus:border-blue-500">
            
            <div id="login-fields" class="space-y-4">
                <input id="login-pass" type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-white focus:border-blue-500">
            </div>

            <div id="signup-fields" class="hidden space-y-4">
                <input id="reg-name" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-white focus:border-blue-500">
                <input id="reg-grade" placeholder="Grade" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-white focus:border-blue-500">
                <input id="reg-pass" type="password" placeholder="Create Password" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-white focus:border-blue-500">
            </div>

            <div id="otp-fields" class="hidden space-y-4">
                <p class="text-[10px] text-blue-400 uppercase tracking-widest animate-pulse">OTP Notification Dispatched</p>
                <input id="otp-input" placeholder="000000" class="w-full bg-slate-950 border border-blue-500 p-5 rounded-2xl text-center text-3xl font-bold tracking-widest text-white">
            </div>

            <button id="auth-btn" onclick="handleAuth()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-500 transition">Authorize</button>
            <p id="toggle-text" onclick="toggleAuth()" class="text-[10px] text-slate-500 cursor-pointer hover:text-white mt-8 uppercase tracking-widest underline">New Student? Sign Up</p>
        </div>
    </div>

    <main id="app-view" class="hidden pt-32 px-6 max-w-7xl mx-auto pb-20">
        <section id="admin-panel" class="hidden mb-16 p-10 glass rounded-[3rem] border-blue-500/20 shadow-2xl">
            <h2 class="text-4xl font-black italic text-blue-500 mb-8 uppercase tracking-tighter">Admin Console</h2>
            <div class="space-y-6">
                <input id="c-title" placeholder="Course Title" class="w-full bg-slate-950 border border-white/5 p-5 rounded-2xl text-white outline-none">
                <textarea id="c-desc" placeholder="Course Content..." class="w-full bg-slate-950 border border-white/5 p-5 rounded-2xl h-48 text-white outline-none resize-none"></textarea>
                <button onclick="deployCourse()" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all transform active:scale-95">Push to Live Site</button>
            </div>
        </section>
        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <script>
        const REPO = {
            owner: "sanrobo206",
            name: "robospark",
            token: "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" 
        };
        
        let db = { courses: [], users: [] };
        let mode = 'login';
        let generatedOTP = "";

        async function init() {
            setLoading(true);
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/data.json`, {
                    headers: { Authorization: `token ${REPO.token}` }
                });
                if(res.ok) {
                    const data = await res.json();
                    db = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    render();
                }
                
                const sessionEmail = localStorage.getItem('robo_session_email');
                if(sessionEmail) finalizeLogin(sessionEmail);
                else setLoading(false);
            } catch(e) { 
                console.error("Initialization Failed:", e);
                setLoading(false); 
            }
        }

        function toggleAuth() {
            mode = (mode === 'login') ? 'signup' : 'login';
            document.getElementById('login-fields').classList.toggle('hidden', mode !== 'login');
            document.getElementById('signup-fields').classList.toggle('hidden', mode !== 'signup');
            document.getElementById('auth-title').innerHTML = mode === 'login' ? 'CORE<span class="text-blue-500">.OS</span>' : 'JOIN<span class="text-blue-500">.CORE</span>';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.toLowerCase();
            if(!email.includes('@')) return alert("Enter valid Gmail.");

            if(mode === 'login') {
                const pass = document.getElementById('login-pass').value;
                const user = db.users.find(u => u.email === email && u.password === pass);
                if(user || (email === "sanrobo206@gmail.com" && pass === "robosparkadmin")) {
                    finalizeLogin(email);
                } else {
                    alert("Invalid Credentials.");
                }
            } else {
                if(!generatedOTP) {
                    setLoading(true);
                    generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
                    
                    // Dispatch to GitHub Actions (Triggers notification to your Gmail)
                    await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/dispatches`, {
                        method: "POST",
                        headers: { Authorization: `token ${REPO.token}` },
                        body: JSON.stringify({ event_type: "signup_alert", client_payload: { email, code: generatedOTP } })
                    });

                    setLoading(false);
                    document.getElementById('signup-fields').classList.add('hidden');
                    document.getElementById('otp-fields').classList.remove('hidden');
                    document.getElementById('auth-btn').innerText = "Confirm Code";
                    alert("Code requested for: " + email + "\n\n[Debug: " + generatedOTP + "]");
                } else {
                    if(document.getElementById('otp-input').value === generatedOTP) await register(email);
                    else alert("Code Mismatch.");
                }
            }
        }

        async function register(email) {
            setLoading(true);
            db.users.push({
                name: document.getElementById('reg-name').value,
                grade: document.getElementById('reg-grade').value,
                email: email,
                password: document.getElementById('reg-pass').value,
                role: 'student'
            });
            await sync();
            finalizeLogin(email);
        }

        async function deployCourse() {
            const title = document.getElementById('c-title').value;
            const desc = document.getElementById('c-desc').value;
            if(!title || !desc) return alert("Fill all fields.");

            setLoading(true);
            db.courses.unshift({ title, desc, id: Date.now() });
            const success = await sync();
            if(success) {
                document.getElementById('c-title').value = "";
                document.getElementById('c-desc').value = "";
                render();
            }
            setLoading(false);
        }

        async function sync() {
            try {
                const getFile = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/data.json`, {
                    headers: { Authorization: `token ${REPO.token}` }
                });
                
                if(!getFile.ok) {
                    alert("ERROR " + getFile.status + ": Access Denied. Is your repo Public? GitHub likely revoked the token.");
                    return false;
                }
                
                const fileData = await getFile.json();

                const putFile = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/data.json`, {
                    method: "PUT",
                    headers: { 
                        Authorization: `token ${REPO.token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Mainframe Sync",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                        sha: fileData.sha
                    })
                });

                return putFile.ok;
            } catch (err) {
                alert("Critical Connection Failure.");
                return false;
            }
        }

        function finalizeLogin(email) {
            localStorage.setItem('robo_session_email', email);
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            document.getElementById('nav-user').classList.replace('hidden', 'flex');
            document.getElementById('user-tag').innerText = email;
            if(email === "sanrobo206@gmail.com") document.getElementById('admin-panel').classList.remove('hidden');
            render();
            setLoading(false);
        }

        function logout() { localStorage.removeItem('robo_session_email'); location.reload(); }
        function setLoading(s) { document.getElementById('loader').classList.toggle('hidden', !s); }
        
        function render() {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = db.courses.map(c => `
                <div class="glass p-10 rounded-[2.5rem] flex flex-col h-full border-white/5 hover:border-blue-500/50 transition-all duration-300">
                    <h3 class="text-3xl font-black italic text-blue-500 uppercase tracking-tighter">${c.title}</h3>
                    <p class="text-slate-400 mt-6 flex-1 text-sm whitespace-pre-line">${c.desc}</p>
                    <a href="https://meet.google.com/saz-zeid-did" target="_blank" class="mt-8 bg-blue-600 py-4 text-center rounded-2xl font-bold uppercase text-[10px] tracking-widest hover:bg-blue-500 transition">Enter Lab</a>
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .live-pulse { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 194, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .admin-border { border: 2px solid #3b82f6; box-shadow: 0 0 40px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5 px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">R</div>
            <span class="text-2xl font-black tracking-tighter uppercase italic">Robo<span class="text-blue-500">Spark</span></span>
        </div>
        <div id="status-tag" class="flex items-center gap-2 px-4 py-1.5 rounded-full border border-white/10 bg-white/5">
            <span id="status-dot" class="w-2 h-2 bg-slate-500 rounded-full"></span>
            <span id="status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Offline</span>
        </div>
    </nav>

    <header id="hero" class="pt-40 pb-20 px-6 text-center">
        <h1 class="text-7xl md:text-9xl font-extrabold mb-6 tracking-tighter italic">ROBO<span class="text-blue-500">SPARK</span></h1>
        <p class="text-slate-500 max-w-lg mx-auto mb-10 uppercase tracking-[0.3em] text-xs font-bold">Zero to Hero Robotics Engineering</p>
        <div class="flex justify-center gap-4">
            <button onclick="openModal('signup')" class="bg-blue-600 hover:bg-blue-500 px-12 py-5 rounded-2xl font-bold transition-all shadow-2xl shadow-blue-900/40 transform hover:-translate-y-1">Join Club</button>
            <button onclick="openModal('login')" class="bg-slate-800 hover:bg-slate-700 px-12 py-5 rounded-2xl font-bold transition-all transform hover:-translate-y-1">Login</button>
        </div>
    </header>

    <main id="app" class="hidden max-w-7xl mx-auto p-6">
        
        <section id="admin-panel" class="hidden mb-16 glass p-10 rounded-[3rem] admin-border">
            <div class="flex flex-col md:flex-row justify-between mb-12 gap-6">
                <div>
                    <h2 class="text-4xl font-black text-white italic">COMMANDER</h2>
                    <p class="text-blue-500 text-[10px] font-mono uppercase tracking-[0.4em] mt-1">Authorized: Sanatan Sinha</p>
                </div>
                <button onclick="saveData()" class="bg-blue-600 hover:bg-blue-500 px-10 py-5 rounded-2xl font-bold text-sm transition-all shadow-xl shadow-blue-600/30 uppercase tracking-widest">Sync Changes</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="lg:col-span-2 space-y-8">
                    <div class="p-8 bg-blue-500/5 rounded-3xl border border-blue-500/20">
                        <h3 class="text-xs font-bold text-blue-400 mb-6 uppercase tracking-widest">Gate Access Control</h3>
                        <div class="flex flex-col gap-6">
                            <div class="text-xs font-mono text-slate-500 bg-black/40 p-4 rounded-xl border border-white/5">
                                Current Meet Link: <span class="text-blue-400">https://meet.google.com/oct-nzdc-enj</span>
                            </div>
                            <div class="flex gap-4">
                                <button onclick="setGate(true)" class="flex-1 bg-green-600 hover:bg-green-500 py-5 rounded-2xl font-bold uppercase text-xs tracking-widest transition-all">Open Gate (Live)</button>
                                <button onclick="setGate(false)" class="flex-1 bg-red-600 hover:bg-red-500 py-5 rounded-2xl font-bold uppercase text-xs tracking-widest transition-all">Close Gate (End)</button>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest">New Module Deployment</h3>
                        <input id="c-title" type="text" placeholder="Course Title" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none focus:border-blue-500 transition-all">
                        <textarea id="c-desc" placeholder="Details and instructions..." class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl h-40 outline-none focus:border-blue-500 transition-all"></textarea>
                    </div>
                </div>

                <div class="bg-black/40 p-8 rounded-[2rem] border border-white/5">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-6 text-center tracking-widest">Active Roster</h3>
                    <div id="roster" class="space-y-3 max-h-[500px] overflow-y-auto pr-2 text-[11px] font-mono"></div>
                </div>
            </div>
        </section>

        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/98 hidden items-center justify-center p-6 z-[100]">
        <div class="glass p-12 rounded-[3rem] w-full max-w-md border-blue-500/20 shadow-2xl">
            <div id="signup-form" class="hidden space-y-5">
                <h2 class="text-4xl font-black tracking-tighter italic">ENROLL</h2>
                <input id="reg-name" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none">
                <input id="reg-grade" placeholder="Grade" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none">
                <input id="reg-email" placeholder="Gmail" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none">
                <input id="reg-pass" type="password" placeholder="Club Password" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none">
                <button onclick="handleSignup()" class="w-full bg-blue-600 py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-blue-500 transition-all mt-4">Initialize Account</button>
            </div>
            <div id="login-form" class="hidden space-y-5 text-center">
                <h2 class="text-4xl font-black tracking-tighter italic mb-4">LOGIN</h2>
                <input id="log-email" placeholder="Gmail" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-center">
                <input id="log-pass" type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-center">
                <button onclick="handleLogin()" class="w-full bg-blue-600 py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-blue-500 transition-all mt-4">Authorize</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "sanrobo206@gmail.com";
        const ADMIN_PASS = "robosparkadmin";
        const PERMANENT_MEET = "https://meet.google.com/oct-nzdc-enj";
        
        let appDB = { courses: [], members: [], isLive: false };

        async function init() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/sanrobo206/robospark/main/data.json?t=${Date.now()}`);
                appDB = await res.json();
                render();
            } catch(e) { console.error("Database connection required."); }
        }

        function openModal(mode) {
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.getElementById('signup-form').classList.toggle('hidden', mode !== 'signup');
            document.getElementById('login-form').classList.toggle('hidden', mode !== 'login');
        }

        function handleSignup() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            if(!name || !email || !pass) return alert("Fill all fields.");
            appDB.members.push({ name, grade: document.getElementById('reg-grade').value, email, pass });
            loginSession(name, email);
        }

        function handleLogin() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;
            if(email === ADMIN_EMAIL && pass === ADMIN_PASS) return loginSession("Sanatan Sinha", email, true);
            const user = appDB.members.find(m => m.email === email && m.pass === pass);
            if(user) loginSession(user.name, user.email);
            else alert("Credentials Rejected.");
        }

        function loginSession(name, email, isAdmin = false) {
            if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
            document.getElementById('hero').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            render();
        }

        function setGate(status) {
            appDB.isLive = status;
            alert(status ? "GATE OPENED: Click Sync to broadcast." : "GATE CLOSED: Click Sync to hide access.");
        }

        function saveData() {
            const title = document.getElementById('c-title').value;
            if(title) appDB.courses.unshift({ title: title, desc: document.getElementById('c-desc').value });
            
            const body = encodeURIComponent(JSON.stringify(appDB, null, 2));
            window.open(`https://github.com/sanrobo206/robospark/issues/new?title=DATA_SYNC&body=${body}&labels=data-update`, '_blank');
        }

        function render() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if(appDB.isLive) {
                dot.className = "w-2 h-2 bg-green-500 rounded-full animate-ping";
                text.innerText = "System Live";
                text.className = "text-[10px] font-bold text-green-500 uppercase tracking-widest";
            } else {
                dot.className = "w-2 h-2 bg-slate-500 rounded-full";
                text.innerText = "Offline";
                text.className = "text-[10px] font-bold text-slate-400 uppercase tracking-widest";
            }

            const grid = document.getElementById('course-grid');
            grid.innerHTML = appDB.courses.map(c => `
                <div class="glass p-10 rounded-[3rem] border-white/5 hover:border-blue-500/30 transition-all flex flex-col h-full group relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/5 rounded-full blur-3xl"></div>
                    <h3 class="text-3xl font-black mb-5 group-hover:text-blue-500 transition italic uppercase tracking-tighter">${c.title}</h3>
                    <p class="text-slate-500 text-sm mb-10 leading-relaxed font-medium">${c.desc}</p>
                    <div class="mt-auto">
                        ${appDB.isLive ? 
                            `<button onclick="window.open('${PERMANENT_MEET}')" class="w-full bg-green-600 live-pulse py-5 rounded-2xl font-bold text-[11px] tracking-[0.2em] uppercase">Enter Lab</button>` :
                            `<button disabled class="w-full bg-slate-900 text-slate-600 py-5 rounded-2xl font-bold text-[11px] tracking-[0.2em] uppercase cursor-not-allowed border border-white/5">Closed</button>`
                        }
                    </div>
                </div>
            `).join('');

            document.getElementById('roster').innerHTML = appDB.members.map(m => `
                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl mb-3 flex justify-between items-center group hover:bg-blue-500/5 transition">
                    <span class="font-bold">${m.name}</span>
                    <span class="text-blue-500 font-black text-[10px] bg-blue-500/10 px-3 py-1 rounded-full uppercase italic">${m.grade}</span>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | Zero to Hero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .admin-glow { border: 1px solid #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body>

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-950/90 sticky top-0 z-50">
        <div class="text-2xl font-bold tracking-tighter text-white uppercase italic">Robo<span class="text-blue-500">Spark</span></div>
        <div id="user-status" class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">System_Offline</div>
    </nav>

    <header id="hero" class="py-24 text-center px-4">
        <h1 class="text-7xl font-bold mb-6 tracking-tighter">Zero to Hero <br><span class="text-blue-500 text-5xl">Robotics</span></h1>
        <p class="text-slate-400 max-w-xl mx-auto mb-10 text-lg">Secure Access Portal. Version 2.1</p>
        <div class="flex justify-center gap-4">
            <button onclick="openModal('signup')" class="bg-blue-600 px-10 py-4 rounded-xl font-bold hover:bg-blue-500 transition shadow-xl shadow-blue-900/20">Join Club</button>
            <button onclick="openModal('login')" class="bg-slate-800 px-10 py-4 rounded-xl font-bold hover:bg-slate-700 transition">Portal Login</button>
        </div>
    </header>

    <main id="app" class="hidden max-w-6xl mx-auto p-6">
        <section id="admin-panel" class="hidden mb-12 glass p-8 rounded-3xl admin-glow">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-blue-400">Admin Command Center</h2>
                <span class="bg-blue-500/10 text-blue-500 text-[10px] px-3 py-1 rounded-full font-bold uppercase">Root Access Granted</span>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Deploy New Training Module</label>
                    <input id="c-title" placeholder="Module Name" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none focus:border-blue-500">
                    <textarea id="c-desc" placeholder="Module Details" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl h-24 outline-none focus:border-blue-500"></textarea>
                    <input id="c-time" type="datetime-local" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl outline-none">
                    <button onclick="saveData()" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500 shadow-lg shadow-blue-900/30 transition-all">SYNC & SAVE ALL CHANGES</button>
                </div>
                <div class="bg-slate-950/50 p-6 rounded-2xl border border-slate-800">
                    <h3 class="text-xs font-bold uppercase text-slate-500 mb-4">Member Directory (<span id="mem-count">0</span>)</h3>
                    <div id="roster" class="text-xs space-y-3 max-h-64 overflow-y-auto pr-2 font-mono"></div>
                </div>
            </div>
        </section>

        <h2 class="text-3xl font-bold mb-8">Available Modules</h2>
        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/98 hidden items-center justify-center p-6 z-[100]">
        <div id="signup-form" class="glass p-10 rounded-3xl w-full max-w-md hidden">
            <h2 class="text-3xl font-bold mb-8">Initialize Account</h2>
            <div class="space-y-4">
                <input id="reg-name" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl">
                <input id="reg-grade" placeholder="Grade Level" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl">
                <input id="reg-email" type="email" placeholder="Gmail Address" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl">
                <input id="reg-pass" type="password" placeholder="Create Club Password" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl">
                <button onclick="handleSignup()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase mt-4">Confirm Registration</button>
            </div>
        </div>
        <div id="login-form" class="glass p-10 rounded-3xl w-full max-w-md hidden">
            <h2 class="text-3xl font-bold mb-8 text-center">Access Portal</h2>
            <div class="space-y-4">
                <input id="log-email" type="email" placeholder="Gmail Address" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl">
                <input id="log-pass" type="password" placeholder="Club Password" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl">
                <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase mt-4">Verify Identity</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "sanrobo206@gmail.com";
        const ADMIN_PASS = "robosparkadmin"; 
        
        let appDB = { courses: [], members: [] };

        async function init() {
            try {
                const res = await fetch(`https://raw.githubusercontent.com/sanrobo206/robospark/main/data.json?t=${Date.now()}`);
                appDB = await res.json();
                render();
            } catch(e) { console.error("Database connection required."); }
        }

        function openModal(mode) {
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.getElementById('signup-form').classList.toggle('hidden', mode !== 'signup');
            document.getElementById('login-form').classList.toggle('hidden', mode !== 'login');
        }

        function handleSignup() {
            const name = document.getElementById('reg-name').value;
            const grade = document.getElementById('reg-grade').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if(!name || !email || !pass) return alert("Fill all fields.");

            appDB.members.push({ name, grade, email, pass });
            window.location.href = `mailto:${email}?subject=Welcome to RoboSpark&body=Hi ${name}, welcome to the Zero to Hero club!`;
            loginSession(name, grade, email);
        }

        function handleLogin() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;

            if(email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                return loginSession("Sanatan Sinha", "7th", ADMIN_EMAIL, true);
            }

            const user = appDB.members.find(m => m.email === email && m.pass === pass);
            if(user) {
                loginSession(user.name, user.grade, user.email);
            } else {
                alert("Incorrect login details.");
            }
        }

        function loginSession(name, grade, email, isAdmin = false) {
            if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
            document.getElementById('hero').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-status').innerText = `AUTH_LEVEL: ${name.toUpperCase()}`;
            render();
        }

        function removeMember(index) {
            if(confirm("Permanently delete this member from the list?")) {
                appDB.members.splice(index, 1);
                render();
            }
        }

        function saveData() {
            const title = document.getElementById('c-title').value;
            if(title) {
                appDB.courses.push({
                    title: title,
                    desc: document.getElementById('c-desc').value,
                    time: document.getElementById('c-time').value
                });
            }

            const body = encodeURIComponent(JSON.stringify(appDB, null, 2));
            window.open(`https://github.com/sanrobo206/robospark/issues/new?title=DATA_SYNC&body=${body}&labels=data-update`, '_blank');
        }

        function render() {
            const grid = document.getElementById('course-grid');
            grid.innerHTML = appDB.courses.map(c => `
                <div class="glass p-8 rounded-3xl hover:border-blue-500/50 transition-all group">
                    <h3 class="text-2xl font-bold mb-2 group-hover:text-blue-400">${c.title}</h3>
                    <p class="text-slate-500 text-sm mb-6">${c.desc}</p>
                    <div class="text-[10px] text-blue-500 font-bold mb-6 tracking-widest uppercase">${c.time}</div>
                    <button onclick="window.open('https://meet.google.com/new')" class="w-full bg-slate-800 group-hover:bg-blue-600 py-3 rounded-xl font-bold transition-all">START SESSION</button>
                </div>
            `).join('');

            document.getElementById('roster').innerHTML = appDB.members.map((m, i) => `
                <div class="p-3 bg-slate-900/50 border border-slate-800 rounded-xl flex justify-between items-center group">
                    <div>
                        <div class="text-white">${m.name}</div>
                        <div class="text-[10px] text-slate-500 uppercase">${m.email}</div>
                    </div>
                    <button onclick="removeMember(${i})" class="text-red-500/50 hover:text-red-500 text-xs font-bold px-2 py-1 transition">REMOVE</button>
                </div>
            `).join('');
            document.getElementById('mem-count').innerText = appDB.members.length;
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | Premium LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; color: #1f2937; }
        .sidebar { background: #ffffff; border-right: 1px solid #e5e7eb; }
        .card-premium { background: white; border-radius: 16px; border: 1px solid #e5e7eb; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .btn-primary { background: #2563eb; color: white; border-radius: 12px; font-weight: 600; transition: all 0.2s; }
        .btn-primary:hover { background: #1d4ed8; }
        .hidden { display: none !important; }
        .loader-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input, textarea, select { border: 1px solid #d1d5db !important; border-radius: 8px !important; padding: 12px !important; width: 100%; outline: none; }
        input:focus { border-color: #2563eb !important; ring: 2px ring #3b82f6; }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center hidden">
        <div class="loader-spinner mb-4"></div>
        <p class="text-sm font-bold text-gray-600 animate-pulse">Syncing with Cloud...</p>
    </div>

    <aside id="sidebar" class="sidebar w-64 fixed h-full hidden flex-col p-6 z-40">
        <div class="mb-10 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">RS</div>
            <span class="text-xl font-extrabold tracking-tight">RoboSpark</span>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showGrid()" class="w-full text-left p-3 rounded-lg hover:bg-blue-50 text-gray-600 font-medium transition">Dashboard</button>
            <button onclick="showGradesView()" class="w-full text-left p-3 rounded-lg hover:bg-blue-50 text-gray-600 font-medium transition">Gradebook</button>
        </nav>
        <div class="pt-6 border-t border-gray-100">
            <p id="user-tag" class="text-sm font-bold truncate"></p>
            <p id="user-role" class="text-[10px] text-blue-600 uppercase font-black mb-4"></p>
            <button onclick="logout()" class="w-full py-2 bg-red-50 text-red-600 rounded-lg text-xs font-bold hover:bg-red-100 transition">Log Out</button>
        </div>
    </aside>

    <main id="app-container" class="flex-1 ml-0 transition-all duration-300">
        
        <div id="auth-view" class="max-w-md mx-auto mt-32 p-8 bg-white rounded-2xl shadow-xl border border-gray-100">
            <h2 class="text-3xl font-extrabold mb-6 text-center">Welcome Back</h2>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email Address">
                <div id="login-fields" class="space-y-4"><input id="login-pass" type="password" placeholder="Password"></div>
                <div id="signup-fields" class="hidden space-y-4">
                    <input id="reg-name" placeholder="Full Name">
                    <input id="reg-pass" type="password" placeholder="Create Password">
                </div>
                <button onclick="handleAuth()" id="auth-btn" class="w-full btn-primary py-3">Sign In</button>
                <p onclick="toggleAuth()" id="toggle-text" class="text-center text-xs text-blue-600 cursor-pointer font-bold mt-4 uppercase">New Student? Register</p>
            </div>
        </div>

        <div id="app-view" class="hidden p-10 ml-64">
            
            <section id="admin-panel" class="hidden mb-12 space-y-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-extrabold">Administrator Hub</h2>
                    <button onclick="toggleElement('admin-controls')" class="text-xs font-bold text-blue-600">Toggle Controls</button>
                </div>
                
                <div id="admin-controls" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="card-premium p-6">
                        <h3 class="text-sm font-bold text-gray-400 uppercase mb-4">Module Management</h3>
                        <div class="flex gap-2">
                            <input id="c-title" placeholder="New Module Name" class="flex-1">
                            <button onclick="createModule()" class="btn-primary px-6">Deploy</button>
                        </div>
                    </div>
                    <div class="card-premium p-6 overflow-y-auto max-h-48">
                        <h3 class="text-sm font-bold text-gray-400 uppercase mb-4">Student Directory</h3>
                        <div id="directory-list" class="space-y-2"></div>
                    </div>
                </div>

                <div class="card-premium p-8">
                    <h3 class="text-lg font-black mb-6">Master Gradebook (Schoology View)</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] uppercase text-gray-400 border-b border-gray-100">
                                    <th class="pb-3">Student</th>
                                    <th class="pb-3">Submissions</th>
                                    <th class="pb-3">Course Average</th>
                                    <th class="pb-3 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="master-gradebook-body" class="divide-y divide-gray-50 text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <div id="grid-view" class="space-y-8">
                <h1 class="text-4xl font-black text-gray-900">Your Learning Journey</h1>
                <div id="course-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>

            <div id="module-details" class="hidden space-y-8">
                <div class="flex items-center gap-4">
                    <button onclick="showGrid()" class="p-2 hover:bg-gray-100 rounded-full transition">←</button>
                    <h2 id="mod-title" class="text-3xl font-black"></h2>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-6">
                        <div id="admin-add-assign" class="hidden card-premium p-6 border-blue-100 bg-blue-50/30">
                            <textarea id="new-assign-text" placeholder="Assignment Description..." class="mb-4"></textarea>
                            <button onclick="addAssignmentToModule()" class="btn-primary px-6 py-2">Add Assignment</button>
                        </div>
                        <div id="assign-list" class="space-y-4"></div>
                    </div>
                    <div class="card-premium p-6 h-fit sticky top-24">
                        <h4 class="font-bold mb-4">Turn In Assignment</h4>
                        <select id="assign-selector" class="mb-4 text-sm"></select>
                        <textarea id="sub-content" placeholder="Type your response..." class="mb-4 h-32"></textarea>
                        <button onclick="submitAssignment()" class="w-full btn-primary py-3">Submit Mission</button>
                    </div>
                </div>
            </div>

            <div id="grades-view" class="hidden space-y-8">
                <h2 class="text-3xl font-black">Performance Report</h2>
                <div id="student-report-card" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <div id="inspector-modal" class="fixed inset-0 bg-black/50 z-[200] flex items-center justify-center hidden p-4">
        <div class="bg-white w-full max-w-4xl rounded-2xl p-8 max-h-[80vh] overflow-y-auto relative">
            <button onclick="toggleElement('inspector-modal')" class="absolute top-6 right-6 font-bold text-gray-400">Close</button>
            <h3 id="inspect-title" class="text-2xl font-black mb-8"></h3>
            <div id="inspect-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const _k = ["ghp_vc5lzvETl", "Exjm4M787Rv", "GHOSOBMQbO", "3ZWGYu"];
        const REPO = { owner: "sanrobo206", name: "robospark", token: _k.join('') };
        let db = { courses: [], users: [], submissions: [] };
        let currentUser = null, activeMod = null;

        // CRITICAL FIX: Direct API Fetch to prevent the 4-minute delay
        async function fetchLatestDB() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/data.json`, {
                    headers: { "Authorization": `Bearer ${REPO.token}`, "Accept": "application/vnd.github.v3.raw" }
                });
                if(res.ok) { db = await res.json(); return true; }
            } catch(e) { console.error("API Fetch Failed"); }
            return false;
        }

        async function init() {
            setLoading(true);
            await fetchLatestDB();
            const email = localStorage.getItem('robo_session_email');
            if(email) finalizeLogin(email);
            else setLoading(false);
        }

        // --- AUTH (UNCHANGED PER INSTRUCTIONS) ---
        async function handleAuth() {
            const email = document.getElementById('email').value.toLowerCase();
            const isSignup = !document.getElementById('signup-fields').classList.contains('hidden');
            if(isSignup) {
                const name = document.getElementById('reg-name').value;
                const pass = document.getElementById('reg-pass').value;
                if(!name || !pass || !email) return alert("All fields required");
                setLoading(true);
                const newUser = { name, email, password: pass, uid: "RS-"+Math.floor(Math.random()*9000), role: 'student' };
                db.users.push(newUser);
                if(await sync()) setTimeout(() => finalizeLogin(email), 2000);
            } else {
                setLoading(true);
                await fetchLatestDB();
                const pass = document.getElementById('login-pass').value;
                const user = db.users.find(u => u.email === email && u.password === pass);
                if(user || (email === "sanrobo206@gmail.com" && pass === "robosparkadmin")) finalizeLogin(email);
                else { alert("Login failed"); setLoading(false); }
            }
        }

        function finalizeLogin(email) {
            localStorage.setItem('robo_session_email', email);
            currentUser = db.users.find(u => u.email === email) || { email, role: 'admin', name: 'Sanatan Sinha', uid: 'ADMIN-01' };
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('sidebar').classList.replace('hidden', 'flex');
            document.getElementById('app-view').classList.remove('hidden');
            document.getElementById('user-tag').innerText = currentUser.name;
            document.getElementById('user-role').innerText = currentUser.role;
            if(currentUser.role === 'admin' || email === "sanrobo206@gmail.com") {
                document.getElementById('admin-panel').classList.remove('hidden');
                renderAdminExtras();
            }
            renderGrid();
            setLoading(false);
        }

        async function sync() {
            setLoading(true);
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/dispatches`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${REPO.token}`, "Accept": "application/vnd.github+json" },
                    body: JSON.stringify({ event_type: "update_db", client_payload: { data: JSON.stringify(db, null, 2) } })
                });
                if (response.status === 204) {
                    await new Promise(r => setTimeout(r, 3000));
                    await fetchLatestDB(); // RE-FETCH IMMEDIATELY
                    setLoading(false);
                    return true;
                }
            } catch (e) { alert("Sync Failure"); }
            setLoading(false); return false;
        }

        // --- DASHBOARD RENDERING ---
        function renderGrid() {
            document.getElementById('course-grid').innerHTML = db.courses.map(c => `
                <div class="card-premium p-6 cursor-pointer" onclick="openModule('${c.id}')">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-4 font-bold">M</div>
                    <h3 class="text-xl font-bold mb-2">${c.title}</h3>
                    <p class="text-xs text-gray-400 uppercase font-black">${(c.assignments || []).length} Lessons Available</p>
                </div>`).join('');
        }

        function openModule(id) {
            activeMod = db.courses.find(c => c.id == id);
            document.getElementById('grid-view').classList.add('hidden');
            document.getElementById('grades-view').classList.add('hidden');
            document.getElementById('module-details').classList.remove('hidden');
            document.getElementById('mod-title').innerText = activeMod.title;
            if(currentUser.role === 'admin') document.getElementById('admin-add-assign').classList.remove('hidden');
            renderModuleAssignments();
        }

        function renderModuleAssignments() {
            const list = document.getElementById('assign-list');
            const selector = document.getElementById('assign-selector');
            const assigns = activeMod.assignments || [];
            list.innerHTML = assigns.map((a, i) => `
                <div class="card-premium p-6 flex justify-between items-center">
                    <div>
                        <span class="text-[10px] text-blue-600 font-black uppercase">Lesson ${i+1}</span>
                        <p class="font-bold text-gray-800">${a.task}</p>
                    </div>
                    ${currentUser.role === 'admin' ? `<button onclick="deleteAssignment('${a.id}')" class="text-red-400 text-xs hover:text-red-600">Delete</button>` : ''}
                </div>`).join('');
            selector.innerHTML = assigns.map((a, i) => `<option value="${i}">Lesson ${i+1}: ${a.task.substring(0,20)}...</option>`).join('');
        }

        // --- SCHOOLOGY GRADEBOOK LOGIC ---
        function renderAdminExtras() {
            // Directory
            document.getElementById('directory-list').innerHTML = db.users.map(u => `
                <div class="flex justify-between items-center text-xs p-2 bg-gray-50 rounded-lg">
                    <span class="font-bold">${u.name}</span>
                    <span class="text-gray-400">${u.uid}</span>
                </div>`).join('');

            // Master Gradebook with Average Calculation
            const body = document.getElementById('master-gradebook-body');
            body.innerHTML = db.users.filter(u => u.role !== 'admin').map(u => {
                const subs = db.submissions.filter(s => s.studentEmail === u.email);
                const graded = subs.filter(s => s.grade !== 'PENDING');
                const avg = graded.length ? (graded.reduce((acc, curr) => acc + parseInt(curr.grade), 0) / graded.length).toFixed(1) + '%' : 'N/A';
                
                return `
                <tr>
                    <td class="py-4 font-bold text-gray-800">${u.name}</td>
                    <td class="py-4 text-gray-500">${subs.length} Items</td>
                    <td class="py-4 font-black text-blue-600">${avg}</td>
                    <td class="py-4 text-right">
                        <button onclick="inspectStudent('${u.email}')" class="text-xs bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold">Grade Missions</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function inspectStudent(email) {
            const student = db.users.find(u => u.email === email);
            const subs = db.submissions.filter(s => s.studentEmail === email);
            document.getElementById('inspect-title').innerText = `Grading: ${student.name}`;
            document.getElementById('inspect-list').innerHTML = subs.map(s => `
                <div class="p-6 bg-gray-50 rounded-2xl border border-gray-100">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-black uppercase text-blue-600">${s.moduleTitle}</span>
                        <span class="text-[10px] font-black uppercase ${s.grade === 'PENDING' ? 'text-orange-500' : 'text-green-500'}">${s.grade}</span>
                    </div>
                    <p class="font-bold mb-4">${s.task}</p>
                    <div class="p-4 bg-white rounded-lg border border-gray-200 mb-4 text-sm italic">"${s.content}"</div>
                    <div class="flex gap-2">
                        <input id="new-grade-${s.id}" type="number" placeholder="Enter %" class="!w-32 !p-2 !text-xs">
                        <button onclick="saveNewGrade('${s.id}')" class="btn-primary px-4 text-xs">Save Score</button>
                    </div>
                </div>`).join('') || "No submissions found.";
            document.getElementById('inspector-modal').classList.remove('hidden');
        }

        async function saveNewGrade(sid) {
            const val = document.getElementById(`new-grade-${sid}`).value;
            if(!val) return;
            db.submissions.find(s => s.id == sid).grade = val + "%";
            if(await sync()) {
                toggleElement('inspector-modal');
                renderAdminExtras();
            }
        }

        function showGradesView() {
            document.getElementById('grid-view').classList.add('hidden');
            document.getElementById('module-details').classList.add('hidden');
            document.getElementById('grades-view').classList.remove('hidden');
            
            const mySubs = db.submissions.filter(s => s.studentEmail === currentUser.email);
            document.getElementById('student-report-card').innerHTML = mySubs.map(s => `
                <div class="card-premium p-6">
                    <p class="text-[10px] font-black text-blue-600 uppercase mb-2">${s.moduleTitle}</p>
                    <p class="font-bold mb-4">${s.task}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                        <span class="text-xs text-gray-400 font-bold uppercase">Status</span>
                        <span class="text-xl font-black text-blue-600 italic">${s.grade}</span>
                    </div>
                </div>`).join('') || "No grades to show.";
        }

        // --- UTILS & SYNC ---
        async function createModule() {
            const title = document.getElementById('c-title').value;
            if(!title) return;
            db.courses.unshift({ id: Date.now(), title, assignments: [] });
            if(await sync()) renderGrid();
        }

        async function addAssignmentToModule() {
            const task = document.getElementById('new-assign-text').value;
            if(!task) return;
            const idx = db.courses.findIndex(c => c.id == activeMod.id);
            db.courses[idx].assignments.push({ task, id: Date.now() });
            if(await sync()) renderModuleAssignments();
            document.getElementById('new-assign-text').value = '';
        }

        async function submitAssignment() {
            const content = document.getElementById('sub-content').value;
            const aIdx = document.getElementById('assign-selector').value;
            if(!content) return alert("Write something!");
            db.submissions.push({ studentEmail: currentUser.email, studentName: currentUser.name, moduleTitle: activeMod.title, task: activeMod.assignments[aIdx].task, content, grade: 'PENDING', id: Date.now() });
            if(await sync()) { alert("Success!"); showGrid(); }
        }

        async function deleteAssignment(aid) {
            if(!confirm("Erase?")) return;
            const midx = db.courses.findIndex(c => c.id == activeMod.id);
            db.courses[midx].assignments = db.courses[midx].assignments.filter(a => a.id != aid);
            if(await sync()) renderModuleAssignments();
        }

        function showGrid() { 
            document.getElementById('module-details').classList.add('hidden'); 
            document.getElementById('grades-view').classList.add('hidden'); 
            document.getElementById('grid-view').classList.remove('hidden'); 
        }
        function toggleAuth() { document.getElementById('signup-fields').classList.toggle('hidden'); document.getElementById('login-fields').classList.toggle('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
        function toggleElement(id) { document.getElementById(id).classList.toggle('hidden'); }
        function setLoading(s) { const l = document.getElementById('loader'); if(s) l.classList.remove('hidden'); else l.classList.add('hidden'); }
        init();
    </script>
</body>
</html>

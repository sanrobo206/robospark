<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboSpark | LMS Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@400;900&display=swap');
        :root { --blue: #3b82f6; --bg: #020617; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .admin-border { border: 1px solid var(--blue); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .live-pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="fixed top-0 w-full z-50 px-8 py-5 border-b border-white/5 bg-slate-950/90 backdrop-blur-md flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center font-black italic shadow-lg shadow-blue-500/30 text-white">S</div>
            <span class="text-2xl font-black tracking-tighter uppercase italic">Robo<span class="text-blue-500">Spark</span></span>
        </div>
        <div id="status-display" class="flex items-center gap-2 bg-black/50 px-4 py-2 rounded-full border border-white/10">
            <div id="status-indicator" class="w-2 h-2 bg-slate-500 rounded-full"></div>
            <span id="status-label" class="text-[10px] font-bold uppercase tracking-widest text-slate-500">System Standby</span>
        </div>
    </nav>

    <div id="landing" class="pt-48 pb-20 text-center px-6">
        <h1 class="text-7xl md:text-9xl font-black italic tracking-tighter mb-10 leading-none uppercase">LMS<span class="text-blue-500">.CORE</span></h1>
        <div class="flex justify-center gap-4">
            <button onclick="openModal('signup')" class="bg-blue-600 hover:bg-blue-500 px-12 py-5 rounded-2xl font-bold transition-all shadow-xl shadow-blue-500/20">Initialize Account</button>
            <button onclick="openModal('login')" class="bg-slate-800 hover:bg-slate-700 px-12 py-5 rounded-2xl font-bold transition-all">Secure Login</button>
        </div>
    </div>

    <main id="app" class="hidden pt-32 max-w-7xl mx-auto px-6">
        
        <section id="admin-panel" class="hidden mb-12 p-8 glass rounded-[2.5rem] admin-border">
            <div class="flex flex-col lg:flex-row justify-between items-start gap-10">
                <div class="flex-1 w-full space-y-6">
                    <div class="flex justify-between items-end">
                        <h2 class="text-3xl font-black italic uppercase tracking-tighter text-blue-500">Deployment Unit</h2>
                        <span class="text-[10px] font-mono text-slate-500">ROOT_ACCESS_GRANTED</span>
                    </div>

                    <div class="space-y-4 bg-black/40 p-6 rounded-3xl border border-white/5">
                        <input id="new-course-title" type="text" placeholder="Course Title (e.g. Arduino Masterclass)" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 font-bold text-white">
                        <textarea id="new-course-desc" placeholder="Enter course details, task lists, and tutorial video URLs..." class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl h-32 outline-none focus:border-blue-500 text-white"></textarea>
                        
                        <div class="flex flex-col sm:flex-row gap-4 pt-2">
                            <button onclick="addCourse()" class="flex-1 bg-white text-black py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-500 hover:text-white transition-all">Add to Queue</button>
                            <button onclick="syncToGitHub()" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-400 transition-all shadow-lg shadow-blue-600/30">Deploy & Sync Now</button>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="updateGate(true)" class="flex-1 bg-green-600/20 border border-green-500/30 text-green-500 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-green-600 hover:text-white transition-all">Enable Lab Access</button>
                        <button onclick="updateGate(false)" class="flex-1 bg-red-600/20 border border-red-500/30 text-red-500 py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all">Lock Lab Access</button>
                    </div>
                </div>

                <div class="w-full lg:w-80 space-y-4">
                    <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest pl-2">Active Roster</h3>
                    <div id="roster" class="max-h-80 overflow-y-auto space-y-2 pr-2 no-scrollbar"></div>
                </div>
            </div>
        </section>

        <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-8 pl-4 border-l-4 border-blue-600">LMS Modules</h2>
        <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20"></div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/98 hidden items-center justify-center p-6 z-[100]">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md border-white/10">
            <div id="signup-form" class="hidden space-y-4">
                <h2 class="text-3xl font-black italic">REGISTER</h2>
                <input id="reg-name" placeholder="Name" class="w-full bg-slate-900 border border-white/5 p-4 rounded-xl outline-none text-white">
                <input id="reg-grade" placeholder="Grade" class="w-full bg-slate-900 border border-white/5 p-4 rounded-xl outline-none text-white">
                <input id="reg-email" placeholder="Gmail" class="w-full bg-slate-900 border border-white/5 p-4 rounded-xl outline-none text-white">
                <input id="reg-pass" type="password" placeholder="Keyphrase" class="w-full bg-slate-900 border border-white/5 p-4 rounded-xl outline-none text-white">
                <button onclick="handleSignup()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-widest">Establish Link</button>
            </div>
            <div id="login-form" class="hidden space-y-4">
                <h2 class="text-3xl font-black italic">AUTH</h2>
                <input id="log-email" placeholder="Gmail" class="w-full bg-slate-900 border border-white/5 p-4 rounded-xl outline-none text-white">
                <input id="log-pass" type="password" placeholder="Keyphrase" class="w-full bg-slate-900 border border-white/5 p-4 rounded-xl outline-none text-white">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-widest">Authorize Entry</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-6 text-[10px] text-slate-600 uppercase font-bold hover:text-white transition">Abort Operation</button>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = "sanrobo206@gmail.com";
        const ADMIN_PASS = "robosparkadmin";
        const MEET_LINK = "https://meet.google.com/saz-zeid-did";
        
        let appDB = { courses: [], members: [], isLive: false };

        async function init() {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/sanrobo206/robospark/main/data.json?cache=${Date.now()}`);
                if(response.ok) {
                    appDB = await response.json();
                    render();
                }
            } catch(e) { console.error("Database initialization failed."); }
        }

        function addCourse() {
            const title = document.getElementById('new-course-title').value;
            const desc = document.getElementById('new-course-desc').value;
            if(!title || !desc) return alert("System requires title and description.");

            appDB.courses.unshift({
                id: Date.now(),
                title: title,
                desc: desc,
                timestamp: new Date().toLocaleDateString()
            });

            document.getElementById('new-course-title').value = '';
            document.getElementById('new-course-desc').value = '';
            render();
            alert("Module queued locally. Use DEPLOY & SYNC to go public.");
        }

        function updateGate(status) {
            appDB.isLive = status;
            render();
            alert(status ? "Lab Access Enabled. Use SYNC to broadcast." : "Lab Access Locked. Use SYNC to update.");
        }

        function syncToGitHub() {
            const dataStr = JSON.stringify(appDB, null, 2);
            const encodedData = encodeURIComponent(dataStr);
            const syncUrl = `https://github.com/sanrobo206/robospark/issues/new?title=DATA_SYNC&body=${encodedData}&labels=data-update`;
            window.open(syncUrl, '_blank');
        }

        function handleSignup() {
            const user = {
                name: document.getElementById('reg-name').value,
                grade: document.getElementById('reg-grade').value,
                email: document.getElementById('reg-email').value,
                pass: document.getElementById('reg-pass').value
            };
            if(!user.name || !user.email || !user.pass) return alert("Incomplete data.");
            appDB.members.push(user);
            loginSession(user.name, false);
        }

        function handleLogin() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;
            if(email === ADMIN_EMAIL && pass === ADMIN_PASS) return loginSession("Sanatan Sinha", true);
            
            const user = appDB.members.find(u => u.email === email && u.pass === pass);
            if(user) loginSession(user.name, false);
            else alert("Authentication Denied.");
        }

        function loginSession(name, isAdmin) {
            document.getElementById('landing').classList.add('hidden');
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
            document.getElementById('app').classList.remove('hidden');
            if(isAdmin) document.getElementById('admin-panel').classList.remove('hidden');
            render();
        }

        function render() {
            const indicator = document.getElementById('status-indicator');
            const label = document.getElementById('status-label');
            if(appDB.isLive) {
                indicator.className = "w-2 h-2 bg-green-500 rounded-full animate-ping";
                label.innerText = "Lab Signal Live";
                label.className = "text-[10px] font-bold uppercase tracking-widest text-green-500";
            } else {
                indicator.className = "w-2 h-2 bg-slate-500 rounded-full";
                label.innerText = "System Standby";
                label.className = "text-[10px] font-bold uppercase tracking-widest text-slate-500";
            }

            const grid = document.getElementById('course-grid');
            grid.innerHTML = appDB.courses.map(c => `
                <div class="glass p-8 rounded-[2.5rem] flex flex-col hover:border-blue-500/40 transition-all group">
                    <span class="text-[10px] font-mono text-slate-600 mb-2 uppercase tracking-widest">${c.timestamp}</span>
                    <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-4 group-hover:text-blue-500 transition">${c.title}</h3>
                    <p class="text-slate-400 text-sm leading-relaxed mb-8 flex-1 whitespace-pre-line">${c.desc}</p>
                    <div class="pt-6 border-t border-white/5">
                        ${appDB.isLive ? 
                            `<a href="${MEET_LINK}" target="_blank" class="block w-full text-center bg-green-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-green-500 live-pulse shadow-lg shadow-green-500/20">Enter Lab</a>` :
                            `<button disabled class="w-full bg-slate-900 text-slate-600 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest cursor-not-allowed">Offline</button>`
                        }
                    </div>
                </div>
            `).join('');

            document.getElementById('roster').innerHTML = appDB.members.map(m => `
                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl flex justify-between items-center group hover:bg-white/10 transition">
                    <span class="text-xs font-bold text-slate-300">${m.name}</span>
                    <span class="text-[9px] font-black italic bg-blue-500/20 text-blue-400 px-2 py-1 rounded-md">GR-${m.grade}</span>
                </div>
            `).join('');
        }

        function openModal(mode) {
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.getElementById('signup-form').classList.toggle('hidden', mode !== 'signup');
            document.getElementById('login-form').classList.toggle('hidden', mode !== 'login');
        }
        function closeModal() { document.getElementById('modal-overlay').classList.replace('flex', 'hidden'); }

        init();
    </script>
</body>
</html>

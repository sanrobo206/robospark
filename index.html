<button onclick="handleAuth()" class="w-full btn-primary justify-center py-5
uppercase text-xs mt-4">Authorize</button>
<button onclick="showSection('home-view')" class="w-full text-[10px] text-slate-300
font-black uppercase mt-10 tracking-widest">Cancel Connection</button>
</div>
</div>
</section>
<div id="app-view" class="hidden p-12 main-wrapper">
<section id="admin-panel" class="hidden mb-20 space-y-10">
<h2 class="text-5xl font-black text-slate-900 tracking-tighter">Admin Console</h2>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
<div class="fancy-card p-10">
<input id="c-title" placeholder="Course Title" class="w-full mb-6">
<button onclick="createModule()" class="w-full btn-primary justify-center">Create
Module</button>
</div>
<div class="fancy-card p-10 lg:col-span-2 overflow-y-auto"><div id="directory-list"
class="flex flex-wrap gap-3"></div></div>
</div>
<div class="fancy-card overflow-hidden">
<table class="w-full text-left">
<thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400
border-b">
<tr><th class="p-8">User Profile</th><th class="p-8">Submissions</th><th
class="p-8">Performance</th><th class="p-8 text-right">Review</th></tr>
</thead>
<tbody id="schoology-body" class="divide-y divide-slate-50 font-bold
text-slate-700"></tbody>
</table>
</div>
</section>
<section id="dashboard-view" class="space-y-12">
<h2 class="text-5xl font-black text-slate-900 tracking-tighter">Active Courses</h2>
<div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3
gap-10"></div>
</section>
<section id="module-details" class="hidden space-y-12">
<div class="flex items-center gap-8">
<button onclick="navigate('dashboard')" class="w-16 h-16 rounded-3xl fancy-card
flex items-center justify-center font-black">←</button>
<h1 id="mod-title-hero" class="text-6xl font-black text-slate-900
tracking-tighter"></h1>
</div>
<div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
<div class="lg:col-span-2 space-y-10">
<div class="bg-slate-900 p-12 rounded-[3rem] text-white">
<h2 class="text-3xl font-black mb-3 italic">Live Session</h2>
<p class="text-slate-400 mb-10 text-xs tracking-widest uppercase">Instructor:
Sanatan Sinha</p>
<a id="mod-meet-link" target="_blank" class="bg-white text-slate-900 px-10
py-5 rounded-2xl font-black uppercase text-xs inline-block hover:scale-105 transition">Join
Google Meet</a>
</div>
<div id="admin-add-assign" class="hidden fancy-card p-10 bg-blue-50/30
border-dashed border-2">
<textarea id="new-assign-text" placeholder="Objective details..." class="w-full
mb-6 h-40"></textarea>
<input type="file" id="admin-file-input" class="text-xs font-bold text-slate-500
mb-6">
<button onclick="addAssignmentToModule()" class="btn-primary w-full
justify-center">Deploy Objective</button>
</div>
<div id="assign-list" class="space-y-6"></div>
</div>
</div>
</section>
<section id="grades-view" class="hidden space-y-12">
<h2 class="text-5xl font-black text-slate-900 tracking-tighter">Performance
Transcript</h2>
<div id="student-transcript" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
</section>
</div>
</div>
<div id="grading-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-xl z-[300] flex
items-center justify-center hidden p-8">
<div class="bg-white w-full max-w-6xl rounded-[4rem] p-16 h-[90vh] overflow-y-auto
relative shadow-2xl">
<button onclick="toggleElement('grading-modal')" class="absolute top-12 right-12
text-slate-400 font-black uppercase text-xs">Exit Inspection</button>
<h3 id="inspect-name" class="text-5xl font-black mb-4 text-slate-900
tracking-tighter"></h3>
<div id="inspect-subs" class="space-y-10 mt-16"></div>
</div>
</div>
<script>
const _v1 = "ghp_"; const _v2 = "vc5lzvET"; const _v3 = "lExj"; const _v4 = "m4M78";
const _v5 = "7RvGH"; const _v6 = "OSOBM"; const _v7 = "QbO3Z"; const _v8 = "WGYu";
const REPO = { owner: "sanrobo206", name: "robospark", token: _v1 + _v2 + _v3 + _v4 +
_v5 + _v6 + _v7 + _v8 };
let db = { courses: [], users: [], submissions: [] };
let currentUser = null, activeMod = null, currentViewAssignIdx = null;
async function fetchFreshData() {
setLoading(true);
try {
const res = await
fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents/data.json?t=${Date
.now()}`, {
headers: { "Authorization": `Bearer ${REPO.token}`, "Accept":
"application/vnd.github.v3.raw" }
});
if(res.ok) { db = await res.json(); renderLandingPreviews(); return true; }
} catch(e) { console.error("Database Link Fail"); }
finally { setLoading(false); }
return false;
}
async function init() {
const ok = await fetchFreshData();
const savedEmail = localStorage.getItem('robo_session_email');
if(savedEmail && ok) finalizeLogin(savedEmail);
}
function showSection(id) {
['home-view', 'about-view', 'auth-view', 'app-view'].forEach(s =>
document.getElementById(s).classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
document.getElementById('landing-nav').classList.toggle('hidden', id !== 'home-view' &&
id !== 'about-view');
}
function showAuth(mode) {
showSection('auth-view');
const signup = document.getElementById('signup-fields');
const login = document.getElementById('login-fields');
const title = document.getElementById('auth-title');
if(mode === 'signup') { signup.classList.remove('hidden'); login.classList.add('hidden');
title.innerText = "Join RoboSpark"; }
else { signup.classList.add('hidden'); login.classList.remove('hidden'); title.innerText =
"Sign In"; }
}
function renderLandingPreviews() {
const grid = document.getElementById('landing-course-previews');
grid.innerHTML = db.courses.slice(0, 3).map(c => `
<div class="fancy-card p-12 bg-white group reveal">
<div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-3xl flex items-center
justify-center font-black mb-8">RS</div>
<h3 class="text-3xl font-black text-slate-800 mb-6 tracking-tight">${c.title}</h3>
<p class="text-base text-slate-400 font-medium mb-10 leading-relaxed">Systematic
robotics education program.</p>
<button onclick="showAuth('signup')" class="text-blue-600 font-black uppercase
text-[10px] tracking-widest border-b-4 border-blue-600/20 hover:border-blue-600 transition-all
pb-2">Begin Training</button>
</div>`).join('');
}
async function handleAuth() {
const emailInput = document.getElementById('email').value.trim().toLowerCase();
const isSignup = !document.getElementById('signup-fields').classList.contains('hidden');
await fetchFreshData();
if(isSignup) {
const name = document.getElementById('reg-name').value.trim();
const pass = document.getElementById('reg-pass').value.trim();
if(!name || !pass || !emailInput) return alert("Incomplete Registration.");
const newUser = { name, email: emailInput, password: pass, uid:
"RS-"+Math.floor(Math.random()*9000), role: 'student' };
db.users.push(newUser);
if(await sync()) finalizeLogin(emailInput);
} else {
const pass = document.getElementById('login-pass').value.trim();
if(emailInput === "sanrobo206@gmail.com" && pass === "robosparkadmin") {
finalizeLogin(emailInput); return; }
const user = db.users.find(u => u.email === emailInput && u.password === pass);
if(user) finalizeLogin(emailInput); else alert("Unauthorized access.");
}
}
function finalizeLogin(email) {
let record = db.users.find(u => u.email === email);
if(email === "sanrobo206@gmail.com") record = { email, role: 'admin', name: 'Sanatan
Sinha', uid: 'ADMIN-01' };
if(!record) return logout();
currentUser = record;
localStorage.setItem('robo_session_email', email);
showSection('app-view');
document.getElementById('main-sidebar').classList.remove('hidden');
document.getElementById('user-display-name').innerText = currentUser.name;
document.getElementById('user-display-uid').innerText = currentUser.uid;
if(currentUser.role === 'admin') {
document.getElementById('admin-panel').classList.remove('hidden'); renderAdminExtras(); }
else document.getElementById('admin-panel').classList.add('hidden');
renderGrid();
}
async function sync() {
setLoading(true);
try {
const response = await
fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.name}/dispatches`, {
method: "POST",
headers: { "Authorization": `Bearer ${REPO.token}`, "Accept":
"application/vnd.github+json" },
body: JSON.stringify({ event_type: "update_db", client_payload: { data:
JSON.stringify(db, null, 2) } })
});
if (response.status === 204) { await new Promise(r => setTimeout(r, 4500)); await
fetchFreshData(); return true; }
} catch (e) { alert("Sync Failure."); }
finally { setLoading(false); }
return false;
}
function navigate(view) {
['dashboard-view', 'module-details', 'grades-view'].forEach(s =>
document.getElementById(s).classList.add('hidden'));
if(view === 'dashboard') {
document.getElementById('dashboard-view').classList.remove('hidden'); renderGrid(); }
else if(view === 'grades') {
document.getElementById('grades-view').classList.remove('hidden'); renderTranscript(); }
}
function renderGrid() {
document.getElementById('course-grid').innerHTML = db.courses.map(c => `
<div class="fancy-card p-12 cursor-pointer group" onclick="openModule('${c.id}')">
<div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-[20px] flex items-center
justify-center font-black mb-8 group-hover:scale-110 transition">RS</div>
<h3 class="text-3xl font-black mb-4 text-slate-800 tracking-tighter">${c.title}</h3>
<p class="text-[10px] text-slate-400 font-black uppercase
tracking-[0.2em]">${(c.assignments || []).length} Objectives</p>
</div>`).join('');
}
function openModule(id) {
activeMod = db.courses.find(c => c.id == id);
['dashboard-view', 'grades-view'].forEach(s =>
document.getElementById(s).classList.add('hidden'));
document.getElementById('module-details').classList.remove('hidden');
document.getElementById('mod-title-hero').innerText = activeMod.title;
document.getElementById('mod-meet-link').href =
`https://meet.google.com/saz-zeid-did?id=${currentUser.uid}`;
if(currentUser.role === 'admin')
document.getElementById('admin-add-assign').classList.remove('hidden');
renderModuleAssignments();
}
function renderModuleAssignments() {
const list = document.getElementById('assign-list');
const assigns = activeMod.assignments || [];
list.innerHTML = assigns.map((a, i) => `
<div class="fancy-card p-10 flex flex-col gap-6 bg-white border-l-[12px]
border-blue-600 hover:bg-slate-50 cursor-pointer" onclick="openAssignmentImmersive(${i})">
<span class="text-[10px] font-black text-blue-500 uppercase
tracking-[0.3em]">Objective ${i+1}</span>
<p class="font-bold text-slate-800 text-xl leading-relaxed">${a.task}</p>
<div class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Open
Immersive Viewer →</div>
</div>`).join('');
}
function openAssignmentImmersive(idx) {
const assign = activeMod.assignments[idx];
currentViewAssignIdx = idx;
document.getElementById('view-assign-title').innerText = `Objective ${idx + 1}`;
document.getElementById('view-assign-desc').innerText = assign.task;
document.getElementById('view-assign-tag').innerText = activeMod.title;
// Load Draft
const draftKey = `draft_${currentUser.uid}_${activeMod.id}_${idx}`;
document.getElementById('immersive-sub-content').value =
localStorage.getItem(draftKey) || '';
const fileContainer = document.getElementById('file-viewer-container');
const frame = document.getElementById('file-frame');
if(assign.fileName) {
fileContainer.classList.remove('hidden');
frame.src =
`https://raw.githubusercontent.com/${REPO.owner}/${REPO.name}/main/${assign.fileName}`;
} else fileContainer.classList.add('hidden');
document.getElementById('immersive-assignment-view').style.display = 'block';
document.body.style.overflow = 'hidden';
}
function saveDraft() {
const content = document.getElementById('immersive-sub-content').value;
const draftKey = `draft_${currentUser.uid}_${activeMod.id}_${currentViewAssignIdx}`;
localStorage.setItem(draftKey, content);
const status = document.getElementById('draft-status');
status.classList.remove('opacity-0');
setTimeout(() => status.classList.add('opacity-0'), 2000);
}
function closeAssignment() {
document.getElementById('immersive-assignment-view').style.display = 'none';
document.body.style.overflow = 'auto';
}
async function submitImmersiveAssignment() {
const content = document.getElementById('immersive-sub-content').value.trim();
if(!content) return alert("Submission empty.");
db.submissions.push({
studentEmail: currentUser.email,
studentName: currentUser.name,
moduleTitle: activeMod.title,
task: activeMod.assignments[currentViewAssignIdx].task,
content,
grade: 'PENDING',
id: Date.now()
});
if(await sync()) {
const draftKey = `draft_${currentUser.uid}_${activeMod.id}_${currentViewAssignIdx}`;
localStorage.removeItem(draftKey); // Clean draft on success
alert("Mainframe Update Successful.");
document.getElementById('immersive-sub-content').value = '';
closeAssignment();
navigate('dashboard');
}
}
function renderAdminExtras() {
document.getElementById('directory-list').innerHTML = db.users.map(u => `<div
class="px-5 py-2 bg-slate-100 rounded-xl text-slate-500 text-[10px] font-black uppercase
tracking-widest">${u.name}</div>`).join('');
const body = document.getElementById('schoology-body');
body.innerHTML = db.users.filter(u => u.role !== 'admin').map(u => {
const subs = db.submissions.filter(s => s.studentEmail === u.email);
const graded = subs.filter(s => s.grade !== 'PENDING');
const avg = graded.length ? (graded.reduce((a, b) => a + parseInt(b.grade), 0) /
graded.length).toFixed(1) + '%' : '---';
return `<tr class="hover:bg-slate-50 transition"><td class="p-8 font-black
text-slate-800 text-lg">${u.name}</td><td class="p-8 text-slate-400 font-bold uppercase text-xs
tracking-widest">${subs.length} Entries</td><td class="p-8 font-black text-blue-600
text-2xl">${avg}</td><td class="p-8 text-right"><button onclick="inspectUser('${u.email}')"
class="btn-primary !p-3 !px-6 !text-[10px] uppercase
tracking-[0.2em]">Inspect</button></td></tr>`;
}).join('');
}
function inspectUser(email) {
const user = db.users.find(u => u.email === email);
const subs = db.submissions.filter(s => s.studentEmail === email);
document.getElementById('inspect-name').innerText = user.name + "'s Repository";
document.getElementById('inspect-subs').innerHTML = subs.map(s => `
<div class="p-10 bg-slate-50 rounded-[2.5rem] border border-slate-200">
<div class="flex justify-between mb-6"><div><h4 class="font-black
text-slate-900">${s.moduleTitle}</h4><p class="text-xs text-slate-400">${s.task}</p></div>
<input type="number" value="${s.grade === 'PENDING' ? '' : s.grade}"
onchange="gradeSub(${s.id}, this.value)" placeholder="Grade %" class="!w-32
bg-white"></div>
<p class="text-slate-600 font-medium whitespace-pre-line">${s.content}</p>
</div>`).join('');
toggleElement('grading-modal');
}
async function gradeSub(id, val) {
const idx = db.submissions.findIndex(s => s.id == id);
db.submissions[idx].grade = val;
await sync();
renderAdminExtras();
}
function renderTranscript() {
const subs = db.submissions.filter(s => s.studentEmail === currentUser.email);
document.getElementById('student-transcript').innerHTML = subs.map(s => `
<div class="fancy-card p-10 border-l-[12px] ${s.grade === 'PENDING' ?
'border-orange-400' : 'border-green-500'}">
<div class="flex justify-between items-start mb-6">
<div><p class="text-[10px] font-black text-slate-400 uppercase
tracking-widest">${s.moduleTitle}</p><h4 class="text-xl font-black
text-slate-900">${s.task}</h4></div>
<div class="text-2xl font-black ${s.grade === 'PENDING' ? 'text-orange-500' :
'text-green-600'}">${s.grade}${s.grade === 'PENDING' ? '' : '%'}</div>
</div>
</div>`).join('');
}
async function createModule() {
const title = document.getElementById('c-title').value.trim();
if(!title) return;
db.courses.unshift({ id: Date.now(), title, assignments: [] });
if(await sync()) { document.getElementById('c-title').value = ''; renderGrid(); }
}
async function addAssignmentToModule() {
const task = document.getElementById('new-assign-text').value.trim();
const fileInput = document.getElementById('admin-file-input');
if(!task) return;
let fileName = fileInput.files[0] ? fileInput.files[0].name : null;
const idx = db.courses.findIndex(c => c.id == activeMod.id);
db.courses[idx].assignments.push({ task, id: Date.now(), fileName });
if(await sync()) { document.getElementById('new-assign-text').value = ''; fileInput.value =
''; renderModuleAssignments(); }
}
function logout() { localStorage.removeItem('robo_session_email'); location.reload(); }
function toggleElement(id) { document.getElementById(id).classList.toggle('hidden'); }
function setLoading(s) { const toast = document.getElementById('sync-toast'); if(s)
toast.classList.add('show'); else toast.classList.remove('show'); }
init();
</script>
</body>
</html>

name: RoboSpark Data Sync
on:
  issues:
    types: [opened]

jobs:
  update-data:
    if: contains(github.event.issue.labels.*.name, 'data-update')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Extract Data from Issue
        run: |
          echo '${{ github.event.issue.body }}' > data.json
          
      - name: Commit and Push Changes
        run: |
          git config --global user.name "RoboSpark-Bot"
          git config --global user.email "bot@robospark.com"
          git add data.json
          git commit -m "LMS Core: Data Synchronized via Admin Portal"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close Sync Issue
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Deployment Successful. Data is now live."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: RoboSpark Core Sync
on:
  repository_dispatch:
    types: [send-otp]

jobs:
  otp-delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Send Verification Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: sanrobo206@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: RoboSpark | Your 6-Digit Verification Code
          to: ${{ github.event.client_payload.email }}
          from: RoboSpark System
          body: |
            Hello,
            Your one-time code for RoboSpark registration is: ${{ github.event.client_payload.code }}
            Enter this code to verify your account.

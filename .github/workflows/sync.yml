name: RoboSpark Mainframe Sync
on:
  repository_dispatch:
    types: [update_db]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update Database File
        run: |
          echo '${{ github.event.client_payload.data }}' > data.json
      - name: Commit and Push Changes
        run: |
          git config --global user.name "RoboSpark-Bot"
          git config --global user.email "bot@robospark.com"
          git add data.json
          git commit -m "Mainframe Update: Data Synchronized" || exit 0
          git push origin main --force
